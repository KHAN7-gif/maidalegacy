function renderAnalytic() {
  const tY=curY, tM=curM;
  const pM2=tM>0?tM-1:11, pY2=tM>0?tY:tY-1;
  const cInc=getMonthTotal('income',tY,tM), cExp=getMonthTotal('expense',tY,tM);
  const pInc=getMonthTotal('income',pY2,pM2), pExp=getMonthTotal('expense',pY2,pM2);
  const iChg=pInc>0?((cInc-pInc)/pInc)*100:0;
  const eChg=pExp>0?((cExp-pExp)/pExp)*100:0;
  const MN2=['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
  const MS2=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
  let mSel2='', ySel2='';
  MS2.forEach((m,i)=>mSel2+=`<option value="${i}"${i===tM?' selected':''}>${m}</option>`);
  for(let y=2025;y<=2030;y++) ySel2+=`<option value="${y}"${y===tY?' selected':''}>${y}</option>`;

  const ms=`${tY}-${String(tM+1).padStart(2,'0')}`;
  const incByCat={}, expByCat={};
  tx.filter(t=>t.date.startsWith(ms)).forEach(t=>{
    if(t.type==='income') incByCat[t.category]=(incByCat[t.category]||0)+t.amount;
    else expByCat[t.category]=(expByCat[t.category]||0)+t.amount;
  });

  const iconMap={'🏪 Sewaan Station':'🎮','🏆 Tournament Prize':'🏆','🎮 Game Sales':'🕹️','📺 Sponsorship':'📺','👕 Merchandise':'👕','💻 Coaching':'💻','📱 Streaming':'📱','⚡ Utiliti':'⚡','💰 Gaji':'💰','🏢 Sewa':'🏢','🌐 Internet':'🌐','📱 Marketing':'📣','🖥️ Hardware':'🖥️','🍔 Makanan':'🍔','🚗 Transport':'🚗'};
  const iBg=['ci-or','ci-bl','ci-gr','ci-pu','ci-re','ci-te','ci-pk','ci-ye','ci-in','ci-cy'];

  function catGrid(catObj, catDefs, type) {
    const shown = new Set();
    let html='';
    let i=0;
    // show categories with data first
    Object.entries(catObj).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{
      shown.add(cat);
      const ico=iconMap[cat]||'💼', bg=iBg[i%iBg.length];
      const nm=cat.replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]\s*/u,'');
      html+=`<div class="cat-item" data-cat="${cat}" data-type="${type}"><div class="cat-ico ${bg}">${ico}</div><div class="cat-name">${nm}</div><div class="cat-amt-val ${type==='income'?'income':'expense'}">RM ${amt.toFixed(2)}</div></div>`;
      i++;
    });
    // show empty categories
    catDefs.filter(c=>!shown.has(c)).forEach(cat=>{
      const ico=iconMap[cat]||'💼', bg=iBg[i%iBg.length];
      const nm=cat.replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]\s*/u,'');
      html+=`<div class="cat-item" data-cat="${cat}" data-type="${type}"><div class="cat-ico ${bg}">${ico}</div><div class="cat-name">${nm}</div><div class="cat-amt-val" style="color:var(--t3)">RM0</div></div>`;
      i++;
    });
    return html;
  }

  // Weekly bars (dynamic month)
  const dim2=new Date(tY,tM+1,0).getDate();
  const wkTots=[0,0,0,0,0];
  for(let d=1;d<=dim2;d++){
    const ds=`${tY}-${String(tM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wi=Math.min(Math.floor((d-1)/7),4);
    wkTots[wi]+=getDayTotal(ds,'income');
  }
  const maxWk=Math.max(...wkTots,1);
  const wkBars=wkTots.map((v,i)=>{
    const h=v===0?4:(v/maxWk)*70;
    return `<div style="flex:1;text-align:center"><div style="background:linear-gradient(180deg,var(--p),#818cf8);border-radius:6px 6px 2px 2px;height:${h}px;min-height:4px;transition:height .4s"></div><div style="font-size:10px;color:var(--t2);font-weight:700;margin-top:5px">Mg${i+1}</div><div style="font-size:9px;color:var(--p);font-weight:800">RM${(v/1000).toFixed(v>=1000?1:0)}${v>=1000?'k':''}</div></div>`;
  }).join('');

  const totExpCat=Object.values(expByCat).reduce((a,b)=>a+b,0);
  const totIncCat=Object.values(incByCat).reduce((a,b)=>a+b,0);

  return `
    <div class="top-bar" style="position:sticky;top:0;z-index:40">
      <div class="tb-row1">
        <div style="font-size:15px;font-weight:900;color:var(--t1)">📊 Analitik</div>
        <div class="nav-pill" style="cursor:default">
          <select id="anlMSel" style="background:transparent;border:none;color:var(--p);font-weight:800;font-size:13px;font-family:inherit;outline:none;cursor:pointer">${mSel2}</select>
          <select id="anlYSel" style="background:transparent;border:none;color:var(--p);font-weight:800;font-size:13px;font-family:inherit;outline:none;cursor:pointer">${ySel2}</select>
        </div>
      </div>
      <div class="tb-row2">
        <div class="tb-stat"><div class="tb-stat-lbl">Pendapatan</div><div class="tb-stat-val tv-in">${fmtFull(cInc)}</div></div>
        <div class="tb-stat"><div class="tb-stat-lbl">Perbelanjaan</div><div class="tb-stat-val tv-ex">${fmtFull(cExp)}</div></div>
        <div class="tb-stat"><div class="tb-stat-lbl">Baki</div><div class="tb-stat-val ${cInc-cExp<0?'tv-neg':'tv-bal'}">${fmtFull(cInc-cExp)}</div></div>
      </div>
    </div>
    <div class="cat-sec-hdr">
      <span class="cat-sec-type">Perbelanjaan (${MN2[tM]} ${tY})</span>
      <span class="cat-sec-amt expense">RM ${totExpCat.toFixed(2)}</span>
    </div>
    <div class="cat-grid" id="expGrid">${catGrid(expByCat,cats.expense,'expense')}</div>
    <div class="cat-sec-hdr">
      <span class="cat-sec-type">Pendapatan (${MN2[tM]} ${tY})</span>
      <span class="cat-sec-amt income">RM ${totIncCat.toFixed(2)}</span>
    </div>
    <div class="cat-grid" id="incGrid">${catGrid(incByCat,cats.income,'income')}</div>
    <div class="sec-hdr"><span class="sec-title">📈 MoM — vs ${MS2[pM2]} ${pY2}</span></div>
    <div class="mom-row">
      <div class="mom-card">
        <div class="mom-lbl">Pendapatan ${MS2[tM]} ${tY}</div>
        <div class="mom-amt income">${fmtFull(cInc)}</div>
        <span class="trend-pill ${iChg>=0?'tp-up':'tp-dn'}">${iChg>=0?'↑':'↓'} ${Math.abs(iChg).toFixed(1)}% vs ${MS2[pM2]}</span>
      </div>
      <div class="mom-card">
        <div class="mom-lbl">Perbelanjaan ${MS2[tM]} ${tY}</div>
        <div class="mom-amt expense">${fmtFull(cExp)}</div>
        <span class="trend-pill ${eChg>=0?'tp-dn':'tp-up'}">${eChg>=0?'↑':'↓'} ${Math.abs(eChg).toFixed(1)}% vs ${MS2[pM2]}</span>
      </div>
    </div>
    <div class="sec-hdr"><span class="sec-title">📊 Pendapatan Mingguan (${MS2[tM]} ${tY})</span></div>
    <div style="padding:0 12px 16px">
      <div style="background:var(--card);border-radius:var(--r-xl);padding:16px;box-shadow:var(--sh-sm);border:1px solid var(--border)">
        <div style="display:flex;align-items:flex-end;gap:8px;height:80px">${wkBars}</div>
      </div>
    </div>
    <div class="ftx-card">
      <div class="ftx-hdr">📋 Transaksi — Klik kategori untuk tapis</div>
      <div id="filtTxList" style="padding:8px 14px;max-height:300px;overflow-y:auto"><div class="empty-txt">Pilih kategori di atas untuk lihat transaksi</div></div>
    </div>
    ${renderYoY()}`;
}

function renderYoY() {
  const MN=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
  const y1=2025, y2=2026;
  const incs1=MN.map((_,i)=>getMonthTotal('income',y1,i));
  const incs2=MN.map((_,i)=>getMonthTotal('income',y2,i));
  const exps2=MN.map((_,i)=>getMonthTotal('expense',y2,i));
  const maxV=Math.max(...incs1,...incs2,1);
  const totY1=incs1.reduce((a,b)=>a+b,0), totY2=incs2.reduce((a,b)=>a+b,0);
  const growth=totY1>0?((totY2-totY1)/totY1*100):0;
  const barsHtml=MN.map((_,i)=>{
    const h1=(incs1[i]/maxV)*100, h2=(incs2[i]/maxV)*100;
    return `<div style="flex:1;text-align:center"><div style="display:flex;gap:1px;align-items:flex-end;justify-content:center;height:70px"><div style="flex:1;background:#bfdbfe;border-radius:3px 3px 1px 1px;height:${h1}%;min-height:${incs1[i]>0?3:0}px"></div><div style="flex:1;background:#5b5bd6;border-radius:3px 3px 1px 1px;height:${h2}%;min-height:${incs2[i]>0?3:0}px"></div></div><div style="font-size:9px;color:var(--t3);margin-top:4px;font-weight:700">${MN[i]}</div></div>`;

  return `
    <div class="sec-hdr"><span class="sec-title">📊 Perbandingan Tahun (2025 vs 2026)</span></div>
    <div class="yoy-chart-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div class="yoy-legend"><span><span style="display:inline-block;width:14px;height:10px;background:#bfdbfe;border-radius:2px;margin-right:4px;vertical-align:middle"></span>2025</span><span><span style="display:inline-block;width:14px;height:10px;background:#5b5bd6;border-radius:2px;margin-right:4px;vertical-align:middle"></span>2026</span></div>
        <span class="trend-pill ${growth>=0?'tp-up':'tp-dn'}" style="font-size:12px">${growth>=0?'↑':'↓'} ${Math.abs(growth).toFixed(1)}% pertumbuhan</span>
      </div>
      <div style="display:flex;gap:3px;align-items:flex-end">${barsHtml}</div>
    </div>
    <div class="sec-hdr"><span class="sec-title">📑 Ringkasan Cukai SST 6%</span></div>
    <div class="tax-card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:4px">Pendapatan ${y2}</div><div style="font-size:18px;font-weight:900;color:var(--green)">${fmtFull(totY2)}</div></div>
        <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:4px">Perbelanjaan ${y2}</div><div style="font-size:18px;font-weight:900;color:var(--red)">${fmtFull(exps2.reduce((a,b)=>a+b,0))}</div></div>
      </div>
      <div style="background:#f9fafb;border-radius:var(--r-md);padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--t2)">Pendapatan Bercukai</span><span style="font-weight:800">${fmtFull(totY2)}</span></div>

window.exportTaxReport = function() {
  const MN=['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
  const rows=[['Bulan','Pendapatan','Perbelanjaan','Untung Bersih','SST 6%','Jumlah+SST']];
  MN.forEach((_,i)=>{
    const inc=getMonthTotal('income',2026,i), exp=getMonthTotal('expense',2026,i);
    rows.push([MN[i],inc.toFixed(2),exp.toFixed(2),(inc-exp).toFixed(2),(inc*0.06).toFixed(2),(inc*1.06).toFixed(2)]);
  });
  const totInc=rows.slice(1).reduce((s,r)=>s+parseFloat(r[1]),0);
  rows.push(['JUMLAH',totInc.toFixed(2),'','','',(totInc*1.06).toFixed(2)]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Laporan Cukai 2026');
  XLSX.writeFile(wb,'laporan_cukai_2026.xlsx');
};

let recF={from:'',to:'',type:'',cat:'',month:'',year:''};
let selIds=new Set();

function getFiltered() {
  let f=[...tx];
  if(recF.from) f=f.filter(t=>t.date>=recF.from);
  if(recF.to)   f=f.filter(t=>t.date<=recF.to);
  if(recF.type) f=f.filter(t=>t.type===recF.type);
  if(recF.cat)  f=f.filter(t=>t.category===recF.cat);
  if(recF.month!==''&&recF.year){const m=+recF.month,y=+recF.year;f=f.filter(t=>{const d=new Date(t.date);return d.getMonth()===m&&d.getFullYear()===y;});}
  else if(recF.year) f=f.filter(t=>new Date(t.date).getFullYear()===+recF.year);
  return f.sort((a,b)=>b.date.localeCompare(a.date));
}

function renderRecord() {

        </div>
      </td>
      <td style="max-width:80px;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.desc||'—'}</td>
      <td style="white-space:nowrap;font-weight:800;font-size:13px" class="${t.type==='income'?'income':'expense'}">${t.type==='income'?'+':'-'}${fmtFull(t.amount)}</td>
      <td style="white-space:nowrap;padding-right:10px">
        <button class="act-ico-btn aib-edit" onclick="editEntry(${t.id})" title="Edit">✏️</button>

function exportCSV() {
  const f=getFiltered();
  const csv=[['Tarikh','Jenis','Kategori','Keterangan','Jumlah'],...f.map(t=>[t.date,t.type==='income'?'Pendapatan':'Perbelanjaan',t.category,t.desc,t.amount])].map(r=>r.join(',')).join('\n');
  dl('\uFEFF'+csv,'transaksi.csv','text/csv;charset=utf-8;');
}
function exportXLSX() {
  const f=getFiltered();
  const ws=XLSX.utils.aoa_to_sheet([['Tarikh','Jenis','Kategori','Keterangan','Jumlah (RM)'],...f.map(t=>[t.date,t.type==='income'?'Pendapatan':'Perbelanjaan',t.category,t.desc,t.amount])]);
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Transaksi');
  XLSX.writeFile(wb,`transaksi_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function exportReport() {
  const f=getFiltered(); if(!f.length){alert('Tiada data');return;}
  const monthly={};
  f.forEach(t=>{const k=t.date.slice(0,7);if(!monthly[k])monthly[k]={inc:0,exp:0,rows:[]};monthly[k][t.type==='income'?'inc':'exp']+=t.amount;monthly[k].rows.push(t);});
  const wb=XLSX.utils.book_new();
  Object.entries(monthly).forEach(([m,d])=>{
    const sd=[['Tarikh','Jenis','Kategori','Keterangan','Jumlah'],...d.rows.map(t=>[t.date,t.type==='income'?'Pendapatan':'Perbelanjaan',t.category,t.desc,t.amount]),[],['Pendapatan','','','',d.inc.toFixed(2)],['Perbelanjaan','','','',d.exp.toFixed(2)],['Baki','','','',(d.inc-d.exp).toFixed(2)]];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sd),m);
  });
  XLSX.writeFile(wb,`laporan_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function importJSON() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);

        // ── Detect full v4.0 backup ─────────────────────────────
        if (d.version && (d.version==='4.0'||d.version==='3.0') && d.transactions && d.categories) {
          const isFull = d.version==='4.0';
          const confirmMsg =
            `📦 ${isFull?'Backup Penuh (v4.0)':'Backup Lama (v3.0)'} ditemui!\n\n` +
            `• ${d.transactions.length} Transaksi\n` +
            `• ${(d.documents||[]).length} Dokumen\n` +
            `• ${(d.gajiList||[]).length} Rekod Gaji\n` +
            `• ${(d.staff||[]).length} Staff\n` +
            `• ${(d.clients||[]).length} Pelanggan\n` +
            `• ${(d.syerHistory||[]).length} Sejarah Syer\n` +
            `• Export: ${d.exportedAt?.slice(0,10)||'?'}\n\n` +
            `Teruskan import? (Data sedia ada akan DIGABUNG)`;
          if (!confirm(confirmMsg)) return;

          let stats = {tx:0,txSkip:0,doc:0,gaji:0,client:0,stk:0,staff:0,syer:0};

          // ── Transactions ──
          (d.transactions||[]).forEach(item => {
            if (item.date && item.type && item.amount) {
              const dup = tx.find(t=>t.date===item.date&&t.amount===item.amount&&t.type===item.type&&t.category===item.category);
              if (!dup) { tx.push({...item,id:Date.now()+Math.random()}); stats.tx++; }
              else stats.txSkip++;
            }
          });

          // ── Categories ──
          if (d.categories) {
            ['income','expense'].forEach(type=>{
              (d.categories[type]||[]).forEach(cat=>{
                if(!cats[type].includes(cat)) cats[type].push(cat);
              });
            });
          }

          // ── Notes ──
          if (d.notes) Object.assign(notes, d.notes);

          // ── Documents ──
          (d.documents||[]).forEach(doc=>{
            if(!docs.find(x=>x.id===doc.id)){docs.push(doc);stats.doc++;}
          });

          // ── Clients ──
          (d.clients||[]).forEach(cl=>{
            if(!clients.find(x=>x.id===cl.id)){clients.push(cl);stats.client++;}
          });

          // ── Stock ──
          (d.stock||[]).forEach(st=>{
            if(!stock.find(x=>x.id===st.id)){stock.push(st);stats.stk++;}
          });

          // ── Gaji ──
          (d.gajiList||[]).forEach(g=>{
            if(!gajiList.find(x=>x.id===g.id)){gajiList.push(g);stats.gaji++;}
          });

          // ── Staff ──
          (d.staff||[]).forEach(s=>{
            if(!staffList.find(x=>x.id===s.id)){staffList.push(s);stats.staff++;}
          });

          // ── Syer History ──
          (d.syerHistory||[]).forEach(h=>{
            if(!syerHistory.find(x=>x.id===h.id)){syerHistory.push(h);stats.syer++;}
          });

          // ── Syer Config (only if empty) ──
          if(d.syerCfg && (!syerCfg.shareholders||!syerCfg.shareholders.length)) {
            syerCfg = d.syerCfg;
          }

          // ── Targets ──
          if(d.targets) Object.assign(targets, d.targets);

          // Save ALL
          saveAll(); saveDocs();
          if(clients.length) localStorage.setItem(SK_CLIENTS, JSON.stringify(clients));
          if(stock.length) localStorage.setItem(SK_STOCK, JSON.stringify(stock));
          saveGaji(); saveStaff(); saveSyer();
          if(Object.keys(targets).length) localStorage.setItem(SK_TARGETS, JSON.stringify(targets));

          render();
          alert(
            `✅ Import Berjaya!\n\n` +
            `📊 Transaksi: +${stats.tx} (${stats.txSkip} berganda)\n` +
            `📄 Dokumen: +${stats.doc}\n` +
            `👥 Pelanggan: +${stats.client}\n` +
            `🎮 Stok: +${stats.stk}\n` +
            `💼 Gaji: +${stats.gaji}\n` +
            `👤 Staff: +${stats.staff}\n` +
            `💰 Syer: +${stats.syer}`
          );

        } else if (Array.isArray(d)) {
          // Simple array of transactions
          let added = 0;
          d.forEach(item=>{
            if(item.date&&item.type&&item.amount){
              tx.push({...item,id:Date.now()+Math.random()});
              added++;
            }
          });
          saveAll(); render();
          alert(`✅ Import JSON berjaya!\n${added} transaksi ditambah.`);

        } else {
          alert('❌ Format JSON tidak dikenali.\nGuna fail backup MDE Finance Pro (v4.0 atau v3.0).');
        }
      } catch(err) {
        alert('❌ Gagal import: ' + err.message);
      }
    };
    r.readAsText(f);
  };
  inp.click();
}


function importJSON() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);

        // Detect full backup format
        if (d.version && d.transactions && d.categories) {
          // Full backup restore
          const confirm1 = confirm(
            `📦 Fail backup penuh ditemui!\n\n` +
            `• ${d.transactions.length} transaksi\n` +
            `• ${(d.documents||[]).length} dokumen\n` +
            `• Export pada: ${d.exportedAt?.slice(0,10)||'tidak diketahui'}\n\n` +
            `Pilih:\n✅ OK = Gabung dengan data sedia ada\n❌ Cancel = Batal`
          );
          if (!confirm1) return;

          let added = 0, skipped = 0;
          d.transactions.forEach(item => {
            if (item.date && item.type && item.amount) {
              // Check duplicate by date+amount+type
              const dup = tx.find(t => t.date===item.date && t.amount===item.amount && t.type===item.type && t.category===item.category);
              if (!dup) { tx.push({...item, id: Date.now()+Math.random()}); added++; }
              else skipped++;
            }
          });
          // Merge categories
          if (d.categories) {
            ['income','expense'].forEach(type => {
              (d.categories[type]||[]).forEach(cat => {
                if (!cats[type].includes(cat)) cats[type].push(cat);
              });
            });
          }
          // Merge notes
          if (d.notes) Object.assign(notes, d.notes);
          // Merge documents
          if (d.documents) {
            d.documents.forEach(doc => {
              if (!docs.find(x=>x.id===doc.id)) docs.push(doc);
            });
            saveDocs();
          }
          saveAll();
          render();
          alert(`✅ Import backup berjaya!\n${added} transaksi baru ditambah\n${skipped} rekod berganda dilangkau`);

        } else if (Array.isArray(d)) {
          // Simple array of transactions
          let added = 0;
          d.forEach(item => {
            if (item.date && item.type && item.amount) {
              tx.push({...item, id: Date.now()+Math.random()});
              added++;
            }
          });
          saveAll(); render();
          alert(`✅ Import JSON berjaya!\n${added} transaksi ditambah.`);

        } else {
          alert('❌ Format JSON tidak dikenali.\nFail mesti mengandungi array transaksi atau fail backup penuh.');
        }
      } catch(err) {
        alert('❌ Gagal import: ' + err.message);
      }
    };
    r.readAsText(f);
  };
  inp.click();
}

function importExcelFile() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.xlsx,.xls,.csv';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        if (rows.length < 2) { alert('Tiada data dalam fail Excel'); return; }

        // Auto-detect header row
        const header = rows[0].map(h => String(h).toLowerCase().trim());
        const colIdx = {
          date:    header.findIndex(h => /tarikh|date/.test(h)),
          type:    header.findIndex(h => /jenis|type/.test(h)),
          cat:     header.findIndex(h => /kategori|category/.test(h)),
          desc:    header.findIndex(h => /keterangan|desc|note/.test(h)),
          amount:  header.findIndex(h => /jumlah|amount|rm/.test(h))
        };
        // Fallback to positional if headers not found
        if (colIdx.date < 0) colIdx.date = 0;
        if (colIdx.type < 0) colIdx.type = 1;
        if (colIdx.cat  < 0) colIdx.cat  = 2;
        if (colIdx.desc < 0) colIdx.desc = 3;
        if (colIdx.amount < 0) colIdx.amount = 4;

        let imported = 0, skipped = 0;
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || row.every(c => c === '')) continue;

          let dateRaw = String(row[colIdx.date] || '').trim();
          // Handle Excel serial date numbers
          if (/^\d{4,5}$/.test(dateRaw)) {
            const d = XLSX.SSF.parse_date_code(parseInt(dateRaw));
            dateRaw = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
          }
          // Normalize date formats: DD/MM/YYYY, MM/DD/YYYY, DD-MM-YYYY
          dateRaw = dateRaw.replace(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/, (_, a, b, y) => {
            // Assume DD/MM/YYYY for Malaysian format
            return `${y}-${String(b).padStart(2,'0')}-${String(a).padStart(2,'0')}`;
          });
          if (!/^\d{4}-\d{2}-\d{2}$/.test(dateRaw)) { skipped++; continue; }

          const typeRaw = String(row[colIdx.type] || '').toLowerCase().trim();
          const type = /income|pendapatan|in|masuk/.test(typeRaw) ? 'income' : 'expense';

          const catRaw = String(row[colIdx.cat] || '').trim();
          const cat = catRaw || (type === 'income' ? '🏪 Sewaan Station' : '⚡ Utiliti');
          // Auto-add new category if not exists
          if (!cats[type].includes(cat)) cats[type].push(cat);

          const desc = String(row[colIdx.desc] || '').trim() || (type === 'income' ? 'Pendapatan' : 'Perbelanjaan');
          const amtRaw = String(row[colIdx.amount] || '0').replace(/[^0-9.]/g, '');
          const amount = parseFloat(amtRaw);
          if (isNaN(amount) || amount <= 0) { skipped++; continue; }

          tx.push({ id: Date.now() + Math.random() + i, date: dateRaw, type, amount, category: cat, desc });
          imported++;
        }
        saveAll(); render();
        alert(`✅ Import Excel berjaya!\n${imported} rekod diimport${skipped > 0 ? `\n${skipped} baris dilangkau (data tidak sah)` : ''}`);
      } catch(err) {
        alert('❌ Gagal import Excel: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(f);
  };
  inp.click();
}

function backupIDB() {
  const req=indexedDB.open('MDEBackup',1);
  req.onupgradeneeded=e=>e.target.result.createObjectStore('bk',{keyPath:'id'});
  req.onsuccess=e=>{
    const db=e.target.result,t=db.transaction(['bk'],'readwrite'),s=t.objectStore('bk');
    s.put({id:'tx',data:tx});s.put({id:'cats',data:cats});s.put({id:'notes',data:notes});
    t.oncomplete=()=>alert('✅ Sandaran berjaya disimpan!');
  };
  req.onerror=()=>alert('❌ Gagal menyimpan sandaran');
}
function restoreIDB() {
  const req=indexedDB.open('MDEBackup',1);
  req.onsuccess=e=>{
    const db=e.target.result,t=db.transaction(['bk'],'readonly'),s=t.objectStore('bk');
    const g=s.get('tx');
    g.onsuccess=()=>{
      if(g.result){tx=g.result.data;const c=s.get('cats');c.onsuccess=()=>{if(c.result)cats=c.result.data;const n=s.get('notes');n.onsuccess=()=>{if(n.result)notes=n.result.data;saveAll();render();alert('✅ Sandaran dipulihkan!');};};}
      else alert('❌ Tiada sandaran ditemui');
    };
  };
  req.onerror=()=>alert('❌ Gagal membaca sandaran');
}

function getNextDocNum(type) {
  const prefix = DOK_TYPES[type].prefix;
  const year = new Date().getFullYear();
  const existing = docs.filter(d => d.type === type && d.num && d.num.includes(String(year)));
  const nums = existing.map(d => { const m = d.num.match(/(\d+)$/); return m ? parseInt(m[1]) : 0; });
  const next = nums.length ? Math.max(...nums) + 1 : 1;
  return `${prefix}-${year}-${String(next).padStart(3,'0')}`;
}

function calcItems(items, taxPct=0) {
  const subtotal = items.reduce((s, it) => s + (parseFloat(it.unitPrice)||0) * (parseFloat(it.qty)||0), 0);
  const tax = subtotal * taxPct / 100;
  return { subtotal, tax, total: subtotal + tax };
}

      const cnt=typeDocs.filter(d=>(d.status||'draf')===k).length;
      if(!cnt) return '';
      return `<button class="sf-btn${dokStatusFilter===k?' on':''}" onclick="setDokStatusFilter('${k}')">${s.icon} ${s.lbl} <span class="sf-count" style="${dokStatusFilter===k?'':'background:var(--border);color:var(--t2)'}">${cnt}</span></button>`;
    }).join('');

  // Filter by status
  const filtered = typeDocs
    .filter(d => dokStatusFilter==='all' || (d.status||'draf')===dokStatusFilter)
    .sort((a,b) => new Date(b.date) - new Date(a.date));

  const listHtml = filtered.length ? filtered.map(d => {

  return `<div class="top-bar" style="position:sticky;top:0;z-index:40"><div class="tb-row1"><div style="font-size:15px;font-weight:900">📄 Dokumen</div><button class="btn btn-p sm" onclick="newDoc()">+ Baru</button></div></div>
    <div class="dok-tabs">${typeTabs}</div>
    <div class="doc-summary-row" style="padding-top:4px">${statusSummary}</div>
    <div class="status-filter-row">${statusFilters}</div>
    <div style="padding:0 12px 100px">${listHtml}</div>`;
}

window.setDokStatusFilter = f => { dokStatusFilter=f; render(); };
window.cycleDocStatus = id => {
  const doc = docs.find(d=>d.id===id); if(!doc) return;
  const keys = Object.keys(DOC_STATUSES);
  const cur = doc.status||'draf';
  const next = keys[(keys.indexOf(cur)+1) % keys.length];
  doc.status = next; saveDocs(); render();
};

// ================================================================
//  NOTIFICATIONS ENGINE
// ================================================================
function getNotifications() {
  const notifs = [];
  const today = new Date(), curMStr = `${curY}-${String(curM+1).padStart(2,'0')}`;
  const totInc = getMonthTotal('income',curY,curM);
  const totExp = getMonthTotal('expense',curY,curM);
  const pM = curM>0?curM-1:11, pY = curM>0?curY:curY-1;
  const prevInc = getMonthTotal('income',pY,pM);

  // Revenue drop alert
  if(prevInc>0 && totInc>0) {
    const drop = ((prevInc-totInc)/prevInc)*100;
    if(drop>20) notifs.push({type:'danger',icon:'📉',title:`Pendapatan Turun ${drop.toFixed(0)}%`,msg:`Bulan ini RM${totInc.toFixed(0)} vs bulan lalu RM${prevInc.toFixed(0)}. Semak operasi.`});
  }

  // Expense ratio alert
  if(totInc>0) {
    const ratio = (totExp/totInc)*100;
    if(ratio>60) notifs.push({type:'warn',icon:'💸',title:`Perbelanjaan Tinggi (${ratio.toFixed(0)}%)`,msg:`Perbelanjaan melebihi 60% pendapatan bulan ini. Kawal kos operasi.`});
  }

  // Target progress
  if(targets[curMStr]) {
    const pct = (totInc/targets[curMStr])*100;
    if(pct<50 && today.getDate()>15) notifs.push({type:'warn',icon:'🎯',title:`Target Separuh Jalan — ${pct.toFixed(0)}%`,msg:`Baru capai RM${totInc.toFixed(0)} dari target RM${targets[curMStr].toFixed(0)}. Perlu tingkatkan usaha.`});
    else if(pct>=100) notifs.push({type:'ok',icon:'🏆',title:'Target Bulanan Dicapai!',msg:`Tahniah! Pendapatan RM${totInc.toFixed(0)} melebihi target RM${targets[curMStr].toFixed(0)}.`});
  }

  // Monthly reminders
  reminders.filter(r=>r.active).forEach(r=>{
    const paid = tx.some(t=>t.type==='expense'&&t.category===r.cat&&t.date.startsWith(curMStr));
    if(!paid && !dismissedNotifs.has(r.id+curMStr)) {
      const isOverdue = today.getDate() > r.day;
      notifs.push({type:isOverdue?'danger':'info',icon:'🔔',title:(isOverdue?'⚠️ Tertunggak: ':'Peringatan: ')+r.title,msg:`RM${r.amount.toFixed(2)} perlu dibayar (setiap ${r.day} haribulan). ${isOverdue?'Sudah LEWAT!':''}`,dismissId:r.id+curMStr});
    }
  });

  // Debt clients
  const totalDebt = clients.reduce((s,cl)=>s+(cl.debt||0),0);
  if(totalDebt>0) notifs.push({type:'warn',icon:'🧾',title:`Hutang Belum Bayar: RM${totalDebt.toFixed(2)}`,msg:`${clients.filter(cl=>cl.debt>0).length} pelanggan mempunyai baki hutang.`});

  // Stock maintenance
  const maint = stock.filter(s=>s.status==='maintenance');
  if(maint.length) notifs.push({type:'warn',icon:'🔧',title:`${maint.length} Peralatan Memerlukan Penyelenggaraan`,msg:maint.map(s=>s.name).join(', ')});

  return notifs.filter(n=>!dismissedNotifs.has(n.dismissId||''));
}

// ================================================================
function getRevenueForecast() {
  const months = [];
  for(let i=5;i>=0;i--){
    let m=curM-i, y=curY;
    while(m<0){m+=12;y--;}
    months.push(getMonthTotal('income',y,m));
  }
  const valid = months.filter(v=>v>0);
  if(valid.length<2) return null;
  // Simple linear regression
  const n=valid.length, xSum=n*(n-1)/2, ySum=valid.reduce((a,b)=>a+b,0);
  const xySum=valid.reduce((s,v,i)=>s+i*v,0);
  const x2Sum=valid.reduce((s,_,i)=>s+i*i,0);
  const slope=(n*xySum-xSum*ySum)/(n*x2Sum-xSum*xSum);
  const intercept=(ySum-slope*xSum)/n;
  return Math.max(0, intercept+slope*n);
}

let activeTab='calendar'; // Buka terus ke Transaksi bulan semasa

function switchTab(tab) {
  if(tab==='_more') { document.getElementById('moreModal').style.display='flex'; return; }
  // Stop overlay timer when leaving
  if(activeTab==='psoverlay' && tab!=='psoverlay') ovStop();
  // Auto-set current month setiap kali buka Transaksi
  if(tab==='calendar'){
    const now=new Date();
    curY=now.getFullYear();
    curM=now.getMonth();
  }
  activeTab = tab; render();
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('on', t.dataset.tab === tab);
  });
}

function render() {
  const root = $('root');
  if(activeTab==='home')           { root.innerHTML=renderHome(); attachHomeEvents(); }
  else if(activeTab==='calendar')  { root.innerHTML=renderCalendar(); attachCalEvents(); }
  else if(activeTab==='record')    { root.innerHTML=renderRecord();   attachRecEvents(); }
  else if(activeTab==='analytic')  { root.innerHTML=renderAnalytic(); attachAnlEvents(); }
  else if(activeTab==='dokumen')     root.innerHTML=renderDocuments();
  else if(activeTab==='settings')    root.innerHTML=renderSettings();
  else if(activeTab==='pelanggan')   root.innerHTML=renderClients();
  else if(activeTab==='stok')        root.innerHTML=renderStock();
  else if(activeTab==='staff')       root.innerHTML=renderStaff();
  else if(activeTab==='psbooking')   { renderPsBooking(); }
  else if(activeTab==='psoverlay')   { root.innerHTML=renderPsOverlay(); ovStart(); }
  else if(activeTab==='gaji')        root.innerHTML=renderGaji();
  else if(activeTab==='syer')        root.innerHTML=renderSyer();
  window.scrollTo(0,0);
  // Update notif badge
  const nd=$('notifBadgeDot'); if(nd){ const n=getNotifications(); nd.style.display=n.length?'block':'none'; }
}

function attachCalEvents() {
  const pM=$('prevM'),nM=$('nextM'),ms=$('mSel'),ys=$('ySel');
  if(pM) pM.onclick=()=>{let m=curM-1,y=curY;if(m<0){m=11;y--;}if(y>=2025&&y<=2030){curM=m;curY=y;render();}};
  if(nM) nM.onclick=()=>{let m=curM+1,y=curY;if(m>11){m=0;y++;}if(y>=2025&&y<=2030){curM=m;curY=y;render();}};
  if(ms) ms.onchange=()=>{curM=+ms.value;render();};
  if(ys) ys.onchange=()=>{curY=+ys.value;render();};
}

function attachRecEvents() {
  $('applyF')?.addEventListener('click',()=>{
    recF={from:$('fFrom').value,to:$('fTo').value,type:$('fType').value,cat:$('fCat').value,month:$('fMonth').value,year:$('fYear').value};

      e.target.checked?selIds.add(id):selIds.delete(id);
      updateSelCount();

    const ids=[...selIds];if(!ids.length){alert('Pilih transaksi dahulu');return;}
    const sel=tx.filter(t=>ids.includes(t.id)),ft=sel[0]?.type;

  $('expXLSX')?.addEventListener('click',exportXLSX);
  $('expReport')?.addEventListener('click',exportReport);
  $('expJSONBtn')?.addEventListener('click',exportJSON);
  $('impJSON')?.addEventListener('click',importJSON);
  $('prtPDF')?.addEventListener('click',printPDF);
}

// ================================================================
// GLASS NAV — Mercury Blob + Sub-bar
// ================================================================
(function(){
  var MLN_TABS = ['home','psbooking','calendar','analytic','_more'];
  var blob     = document.getElementById('mlnBlob');
  var gooLayer = document.getElementById('mlnGoo');
  var subbar   = document.getElementById('mlnSubbar');
  var savedRow = document.getElementById('mlnSavedRow');
  var currIdx  = 0;
  var _lq      = null;

  function slideBlob(i){
    if(!blob||!gooLayer) return;
    if(i === currIdx){ currIdx=i; return; }
    var dist = Math.abs(i - currIdx);
    var mid  = (currIdx + i) / 2;
    // Mercury tail
    var g = document.createElement('span');
    g.className = 'mln-blob';
    g.style.transform = 'translateX('+( currIdx*100)+'%)';
    gooLayer.appendChild(g);
    requestAnimationFrame(function(){
      g.style.transition = 'transform .55s cubic-bezier(.5,0,.2,1) .07s, opacity .3s ease .3s';
      g.style.transform  = 'translateX('+(i*100)+'%)';
      g.style.opacity    = '0';
    });
    setTimeout(function(){ g.remove(); }, 680);
    // Main pill stretch then snap
    var stretch = Math.min(1 + dist * 0.55, 2.3);
    blob.style.transition = 'transform .24s cubic-bezier(.4,0,.4,1)';
    blob.style.transform  = 'translateX('+(mid*100)+'%) scaleX('+stretch+')';
    clearTimeout(_lq);
    _lq = setTimeout(function(){
      blob.style.transition = 'transform .34s cubic-bezier(.34,1.5,.5,1)';
      blob.style.transform  = 'translateX('+(i*100)+'%) scaleX(1)';
    }, 175);
    currIdx = i;
  }

  function updateTabActive(tab){
    document.querySelectorAll('.mln-tab').forEach(function(t){
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    // Show/hide PS Booking sub-bar
    if(tab === 'psbooking'){
      subbar.classList.remove('hidden');
      subbar.classList.remove('mln-pop');
      void subbar.offsetWidth; // reflow
      subbar.classList.add('mln-pop');
    } else {
      subbar.classList.add('hidden');
    }
  }

  // Main tab clicks
  document.querySelectorAll('.mln-tab').forEach(function(t){
    t.addEventListener('click', function(){
      var tab = t.dataset.tab;
      var i   = MLN_TABS.indexOf(tab);
      if(i >= 0) slideBlob(i);
      switchTab(tab); // existing routing
      updateTabActive(tab);
    });
  });

  // Sub-bar clicks (PS Booking sub-tabs)
  document.querySelectorAll('.mln-stab').forEach(function(s){
    s.addEventListener('click', function(){
      document.querySelectorAll('.mln-stab').forEach(function(x){ x.classList.remove('on'); });
      s.classList.add('on');
      var svKey = s.dataset.sv;
      if(svKey && typeof sv === 'function') sv(svKey);
    });
  });

  // Show saved toast (called when data saved)
  window.mlnShowSaved = function(){
    if(!savedRow) return;
    savedRow.style.display = 'flex';
    clearTimeout(savedRow._t);
    savedRow._t = setTimeout(function(){ savedRow.style.display='none'; }, 2200);
  };

  // Sync blob on tab switch from other sources (sidebar)
  var origSwitch = window.switchTab;
  window.switchTab = function(tab){
    origSwitch(tab);
    var i = MLN_TABS.indexOf(tab);
    if(i >= 0) slideBlob(i);
    updateTabActive(tab);
  };

})();

function fmtRM(n){ return 'RM '+parseFloat(n||0).toFixed(2); }

function renderGaji(){
  var monthLabels={'01':'Jan','02':'Feb','03':'Mac','04':'Apr','05':'Mei','06':'Jun','07':'Jul','08':'Ogo','09':'Sep','10':'Okt','11':'Nov','12':'Dis'};
  var allMonths=[...new Set(gajiList.map(function(g){return g.date.slice(0,7);}) )].sort().reverse();

  var filtered=gajiList.filter(function(g){
    if(gajiFilter.type!=='all'&&g.type!==gajiFilter.type)return false;
    if(gajiFilter.month&&!g.date.startsWith(gajiFilter.month))return false;
    if(gajiFilter.search){var s=gajiFilter.search.toLowerCase();if(!g.name.toLowerCase().includes(s)&&!(g.notes||'').toLowerCase().includes(s))return false;}
    if(gajiFilter.from&&g.date<gajiFilter.from)return false;
    if(gajiFilter.to&&g.date>gajiFilter.to)return false;
    return true;
  }).sort(function(a,b){return b.date.localeCompare(a.date);});

  var totAll   = filtered.reduce(function(s,g){return s+g.total;},0);
  var totStaff = filtered.filter(function(g){return g.type==='staff';}).reduce(function(s,g){return s+g.total;},0);
  var totPT    = filtered.filter(function(g){return g.type==='parttime';}).reduce(function(s,g){return s+g.total;},0);

  var monthPillsHtml = allMonths.slice(0,12).map(function(m){
    var parts=m.split('-'), lbl=(monthLabels[parts[1]]||parts[1])+' '+parts[0];
    var isOn = gajiFilter.month===m;
    return '<button class="gm-pill'+(isOn?' on':'')+'" onclick="toggleGajiMonth(\''+m+'\')">'+lbl+'</button>';
  }).join('');

  var rows = filtered.length ? filtered.map(function(g){
    var badge = g.type==='staff'
      ? '<span class="badge-staff">Staff</span>'
      : '<span class="badge-pt">Part Time</span>';
    return '<tr>'
      +'<td style="font-size:12px;color:var(--t2);white-space:nowrap">'+g.date+'</td>'
      +'<td style="font-weight:700">'+g.name+'</td>'
      +'<td>'+badge+'</td>'
      +'<td class="num">RM '+(g.basic||0).toFixed(2)+'</td>'
      +'<td class="num">RM '+(g.incentive||0).toFixed(2)+'</td>'
      +'<td class="num">RM '+(g.parking||0).toFixed(2)+'</td>'
      +'<td class="num" style="color:var(--blue);font-weight:900">RM '+g.total.toFixed(2)+'</td>'
      +'<td style="font-size:11px;color:var(--t2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(g.notes||'—')+'</td>'
      +'<td style="font-size:11px">'+(g.createdBy||'—')+'</td>'
      +'<td><div style="display:flex;gap:5px;justify-content:flex-end">'
      +'<button class="gaji-btn gaji-btn-slip" onclick="printSlipGaji(\''+g.id+'\')" title="Print Slip Gaji">🖨️</button>'
      +'<button class="gaji-btn gaji-btn-edit" onclick="gajiEdit(\''+g.id+'\')" title="Edit">✏️</button>'
      +'<button class="gaji-btn gaji-btn-del" onclick="gajiDel(\''+g.id+'\')" title="Padam">🗑️</button>'
      +'</div></td>'
      +'</tr>';
  }).join('') : '<tr><td colspan="10"><div class="gaji-empty"><div class="gaji-empty-ico">📭</div><div class="gaji-empty-txt">Tiada rekod gaji</div></div></td></tr>';

  var totalRow = filtered.length
    ? '<tr style="background:#f9fafb;font-weight:900"><td colspan="3" style="font-size:12px;color:var(--t2);padding:10px 12px">JUMLAH ('+filtered.length+' rekod)</td><td class="num">—</td><td class="num">—</td><td class="num">—</td><td class="num" style="color:var(--blue);font-size:14px">RM '+totAll.toFixed(2)+'</td><td colspan="3"></td></tr>'
    : '';

  var activeType = gajiFilter.type;
  var html = ''
   +'<div class="top-bar" style="position:sticky;top:0;z-index:40"><div class="tb-row1"><div style="font-size:15px;font-weight:900">💼 Rekod Gaji</div><button class="btn btn-p sm" onclick="gajiNew()">＋ Rekod Gaji</button></div></div>'
   +'<div style="padding-bottom:80px">'
   // Summary
   +'<div class="gaji-summary">'
   +'<div class="gss"><div class="gss-v" style="color:var(--blue)">RM '+totAll.toFixed(2)+'</div><div class="gss-l">Jumlah</div></div>'
   +'<div class="gss"><div class="gss-v" style="color:#1d4ed8">RM '+totStaff.toFixed(2)+'</div><div class="gss-l">Staff</div></div>'
   +'<div class="gss"><div class="gss-v" style="color:#7c3aed">RM '+totPT.toFixed(2)+'</div><div class="gss-l">Part Time</div></div>'
   +'<div class="gss"><div class="gss-v">'+filtered.length+'</div><div class="gss-l">Rekod</div></div>'
   +'</div>'
   // Type filter
   +'<div class="gaji-type-tabs" style="padding-top:10px">'
   +'<button class="gtt'+(activeType==='all'?' on':'')+'" onclick="setGajiFilter(\'type\',\'all\')">Semua</button>'
   +'<button class="gtt'+(activeType==='staff'?' on-green':'')+'" onclick="setGajiFilter(\'type\',\'staff\')">👔 Staff</button>'
   +'<button class="gtt'+(activeType==='parttime'?' on-pu':'')+'" onclick="setGajiFilter(\'type\',\'parttime\')">⏰ Part Time</button>'
   +'</div>'
   // Month pills
   +(monthPillsHtml ? '<div class="gaji-month-row">'+monthPillsHtml+'</div>' : '')
   // Filter bar
   +'<div style="padding:0 14px 12px">'
   +'<div style="background:var(--card);border-radius:var(--r-lg);padding:14px;box-shadow:var(--sh-sm);border:1px solid var(--border)">'
   +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end">'
   +'<div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px">Carian</div>'
   +'<input class="inp" id="gajiSearch" placeholder="nama / catatan..." value="'+(gajiFilter.search||'')+'" oninput="gajiFilter.search=this.value" onkeypress="if(event.key===\'Enter\')render()" style="width:100%"></div>'
   +'<div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px">Dari</div>'
   +'<input type="date" class="inp" id="gajiFrom" value="'+(gajiFilter.from||'')+'" onchange="setGajiFilter(\'from\',this.value)" style="width:100%"></div>'
   +'<div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:4px">Hingga</div>'
   +'<input type="date" class="inp" id="gajiTo" value="'+(gajiFilter.to||'')+'" onchange="setGajiFilter(\'to\',this.value)" style="width:100%"></div>'
   +'<div style="display:flex;gap:6px">'
   +'<button class="btn btn-p sm" onclick="render()">🔍</button>'
   +'<button class="btn sm" onclick="resetGajiFilter()" title="Reset">✕</button>'
   +'</div></div></div></div>'
   // Table
   +'<div class="gaji-tbl-wrap">'
   +'<div style="background:var(--card);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm);border:1px solid var(--border)">'
   +'<table class="gaji-tbl"><thead><tr>'
   +'<th>Tarikh</th><th>Nama</th><th>Jenis</th>'
   +'<th style="text-align:right">Gaji Asas</th><th style="text-align:right">Insentif</th><th style="text-align:right">Elaun Parking</th>'
   +'<th style="text-align:right">Jumlah</th><th>Catatan</th><th>Dibuat Oleh</th><th>Tindakan</th>'
   +'</tr></thead><tbody>'+rows+totalRow+'</tbody></table>'
   +'</div></div>'
   // Footer
   +'<div class="gaji-footer">'
   +'<div style="font-size:12px;color:var(--t2)">'+filtered.length+' rekod'+(gajiFilter.month?' &middot; '+gajiFilter.month:'')+'</div>'
   +'<div style="display:flex;gap:8px">'
   +'<button class="btn sm" onclick="gajiExportCSV()">⬇ CSV</button>'
   +'<button class="btn sm" onclick="gajiExportPrint()">🖨 Print</button>'
   +'</div></div>'
   +'</div>';

  return html;
}

window.setGajiFilter   = function(k,v){ gajiFilter[k]=v; render(); };
window.toggleGajiMonth = function(m){ gajiFilter.month = (gajiFilter.month===m)?'':m; render(); };
window.resetGajiFilter = function(){ gajiFilter={type:'all',search:'',from:'',to:'',month:''}; render(); };


window.gajiNew=()=>{
  gajiEditId=null;
  showGajiModal({date:new Date().toISOString().slice(0,10),name:'',type:'staff',basic:0,incentive:0,parking:0,notes:'',createdBy:currentUser?.username||''});
};
window.gajiEdit=id=>{
  const g=gajiList.find(x=>x.id===id);if(!g)return;
  gajiEditId=id;showGajiModal({...g});
};
window.gajiDel=function(id){
  if(!confirm('Padam rekod gaji ini?'))return;
  var g=gajiList.find(function(x){return x.id===id;});
  // Padam transaksi berkaitan juga
  if(g&&g.txId){
    tx=tx.filter(function(t){return String(t.id)!==String(g.txId);});
    saveAll();
  }
  gajiList=gajiList.filter(function(x){return x.id!==id;});
  saveGaji();render();
};

window.calcGajiTotal=()=>{
  const b=+(document.getElementById('gfBasic')?.value||0);
  const i=+(document.getElementById('gfIncentive')?.value||0);
  const p=+(document.getElementById('gfParking')?.value||0);
  const el=document.getElementById('gfTotal');
  if(el)el.textContent='RM '+(b+i+p).toFixed(2);
};

window.saveGajiForm=function(){
  var date     = (document.getElementById('gfDate')?.value||'').trim();
  var name     = (document.getElementById('gfName')?.value||'').trim();
  var type     = document.getElementById('gfType')?.value||'staff';
  var basic    = parseFloat(document.getElementById('gfBasic')?.value)||0;
  var incentive= parseFloat(document.getElementById('gfIncentive')?.value)||0;
  var parking  = parseFloat(document.getElementById('gfParking')?.value)||0;
  var notesVal = (document.getElementById('gfNotes')?.value||'').trim();
  var createdBy= (document.getElementById('gfBy')?.value||'').trim();

  if(!date||!name){ alert('Sila isi Tarikh dan Nama'); return; }
  var total = basic + incentive + parking;
  var catName = type==='staff' ? 'Gaji Staff' : 'Gaji Part Time';

  // Pastikan kategori wujud dalam cats.expense
  if(!cats.expense.includes(catName)) cats.expense.push(catName);

  if(gajiEditId){
    // ── EDIT ── kemaskini rekod gaji & transaksi berkaitan
    var idx = gajiList.findIndex(function(x){ return x.id===gajiEditId; });
    if(idx>-1){
      var old = gajiList[idx];
      gajiList[idx] = Object.assign({},old,{date,name,type,basic,incentive,parking,total,notes:notesVal,createdBy});
      // Kemaskini transaksi yang berkaitan (jika ada)
      if(old.txId){
        var tIdx = tx.findIndex(function(t){ return String(t.id)===String(old.txId); });
        if(tIdx>-1){
          tx[tIdx].date     = date;
          tx[tIdx].amount   = total;
          tx[tIdx].category = catName;
          tx[tIdx].desc     = name+' ('+(type==='staff'?'Staff':'Part Time')+')';
          tx[tIdx].notes    = notesVal;
        }
      }
    }
  }else{
    // ── BARU ── cipta rekod gaji + transaksi auto
    var txId  = Date.now() + Math.random();
    var newTx = {
      id:       txId,
      date:     date,
      type:     'expense',
      category: catName,
      desc:     name + ' - ' + (type==='staff'?'Staff':'Part Time'),
      amount:   total,
      notes:    notesVal || ''
    };
    tx.push(newTx);

    var newGaji = {id:'gj'+Date.now(),date,name,type,basic,incentive,parking,total,notes:notesVal,createdBy,txId};
    gajiList.push(newGaji);
  }

  saveAll();   // simpan tx + cats
  saveGaji();  // simpan gajiList

  var modal = document.getElementById('gajiModal');
  if(modal) modal.remove();
  render();
  // Tunjuk toast kejayaan
  if(typeof toast==='function') toast('✅ Rekod gaji disimpan & masuk Transaksi Harian','success');
};

function gajiExportCSV(){
  const rows=gajiList.map(g=>[g.date,g.name,g.type==='staff'?'Staff':'Part Time',g.basic,g.incentive,g.parking,g.total,g.notes||'',g.createdBy||''].join(',')).join('\n');
  const csv='Tarikh,Nama,Jenis,Gaji Asas,Insentif,Elaun Parking,Jumlah,Catatan,Dibuat Oleh\n'+rows;
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='rekod_gaji.csv';a.click();
}
function gajiExportPrint(){
  const rows=gajiList.map(g=>`<tr><td>${g.date}</td><td>${g.name}</td><td>${g.type==='staff'?'Staff':'Part Time'}</td><td>RM ${g.basic.toFixed(2)}</td><td>RM ${g.incentive.toFixed(2)}</td><td>RM ${g.parking.toFixed(2)}</td><td><b>RM ${g.total.toFixed(2)}</b></td><td>${g.notes||''}</td></tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Rekod Gaji</title><style>body{font-family:Arial,sans-serif;padding:24px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;font-size:12px}th{background:#f5f5f5;font-weight:700}h2{margin-bottom:8px}</style></head><body><h2>💼 Rekod Gaji Staff & Part Time — MAIDA LEGACY</h2><p style="color:#666;margin-bottom:12px">Diexport: ${new Date().toLocaleString('ms-MY')}</p><table><thead><tr><th>Tarikh</th><th>Nama</th><th>Jenis</th><th>Gaji Asas</th><th>Insentif</th><th>Elaun Parking</th><th>Jumlah</th><th>Catatan</th></tr></thead><tbody>${rows}</tbody></table><script>window.print()<\/script></body></html>`);
  w.document.close();
}

function renderSyer(){
  // Get income/expense/gaji for selected month
  const [mY,mM]=syerMonth.split('-');
  const mKey=syerMonth;
  const mTx=tx.filter(t=>t.date&&t.date.startsWith(mKey));
  const mIncome=mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExpense=mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  // Gaji sudah termasuk dalam mExpense (auto-create transaction) — JANGAN tolak lagi
  const mGaji=gajiList.filter(g=>g.date&&g.date.startsWith(mKey)).reduce((s,g)=>s+g.total,0);
  const netProfit=mIncome-mExpense; // = Baki dalam tab Transaksi
  const kedaiAmt=netProfit>0?netProfit*(syerCfg.kedaiPct/100):0;
  const syerPool=netProfit>0?netProfit*(syerCfg.syerPct/100):0;
  const totalShPct=syerCfg.shareholders.filter(s=>s.active).reduce((s,x)=>s+x.pct,0);

  // Shareholder rows
  const shRows=syerCfg.shareholders.filter(s=>s.active).map(sh=>{
    const amt=syerPool*(sh.pct/100);
    return`<tr>
      <td style="font-weight:700">${sh.name}</td>
      <td style="text-align:center">${sh.pct.toFixed(2)}</td>
      <td style="text-align:right;font-weight:800;color:var(--blue)">${fmtRM(amt)}</td>
    </tr>`;
  }).join('');

  // History for this month
  const mHistory=syerHistory.filter(h=>h.month===mKey);
  const histRows=mHistory.map(h=>`
    <tr>
      <td style="padding:10px 12px;font-weight:700;border-bottom:1px solid #f5f5f5">
        ${h.name}
        ${h.manual?'<span style="font-size:10px;font-weight:700;background:#fef3c7;color:#d97706;padding:1px 6px;border-radius:var(--r-full);margin-left:4px">Manual</span>':''}
      </td>
      <td style="text-align:center;padding:8px;border-bottom:1px solid #f5f5f5">${h.pct?h.pct.toFixed(2):'—'}</td>
      <td style="text-align:right;padding:8px;font-weight:800;color:var(--blue);border-bottom:1px solid #f5f5f5">RM ${h.amount.toFixed(2)}</td>
      <td style="padding:8px;border-bottom:1px solid #f5f5f5">
        <span class="badge-type ${h.status==='paid'?'bt-paid':'bt-pending'}">${h.status==='paid'?'Paid':'Pending'}</span>
      </td>
      <td style="font-size:11px;color:var(--t2);padding:8px;border-bottom:1px solid #f5f5f5">
        ${h.txDate||h.createdAt||'—'}
        ${h.txId?'<br><span style="color:var(--green);font-size:10px">📊 Dalam Transaksi</span>':''}
      </td>
      <td style="padding:8px;border-bottom:1px solid #f5f5f5">
        <div style="display:flex;gap:4px">
          ${h.status!=='paid'?`<button class="act-ico-btn aib-edit" onclick="markSyerPaid('${h.id}')" title="Mark Paid">✅</button>`:''}
          <button class="act-ico-btn aib-del" onclick="delSyerHistory('${h.id}')" title="Padam">🗑️</button>
        </div>
      </td>
    </tr>`).join('');

  // All history (all months)
  // Sort by txDate or createdAt descending
  const allHist=[...syerHistory].sort((a,b)=>{
    const da=a.txDate||a.createdAt||'';
    const db=b.txDate||b.createdAt||'';
    return db.localeCompare(da);
  });

window.calcSyerDist=()=>{
  const mKey=syerMonth;
  const mTx=tx.filter(t=>t.date&&t.date.startsWith(mKey));
  const mIncome=mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExpense=mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  // Gaji sudah dalam mExpense — JANGAN tolak lagi (formula = Baki Transaksi)
  const netProfit=mIncome-mExpense;
  if(netProfit<=0){alert('Net Profit bulan ini adalah RM '+netProfit.toFixed(2)+'. Tiada pembahagian boleh dibuat.');return;}
  const syerPool=+(netProfit*(syerCfg.syerPct/100)).toFixed(2);
  const now=new Date().toLocaleString('ms-MY');
  // Tarikh = hari terakhir bulan
  const [mY,mM]=mKey.split('-');
  const lastDay=new Date(+mY,+mM,0).getDate();
  const txDate=`${mKey}-${String(lastDay).padStart(2,'0')}`;
  // Pastikan kategori wujud
  if(!cats.expense.includes('Pembahagian Syer'))cats.expense.push('Pembahagian Syer');
  // Padam rekod & transaksi lama bulan ini (avoid duplicate)
  const oldIds=syerHistory.filter(h=>h.month===mKey).map(h=>h.txId).filter(Boolean);
  if(oldIds.length)tx=tx.filter(t=>!oldIds.includes(String(t.id)));
  syerHistory=syerHistory.filter(h=>h.month!==mKey);
  // Cipta rekod baru
  const newRecs=syerCfg.shareholders.filter(s=>s.active).map(sh=>{
    const amt=+(syerPool*(sh.pct/100)).toFixed(2);
    const txId=Date.now()+Math.random();
    // Auto masuk Transaksi Harian
    tx.push({id:txId,date:txDate,type:'expense',category:'Pembahagian Syer',
      desc:'Syer '+sh.name+' ('+sh.pct+'%)',amount:amt,
      notes:'Auto dari Pembahagian Syer '+mKey});
    return {id:'sy'+Date.now()+Math.random(),month:mKey,name:sh.name,pct:sh.pct,
      amount:amt,status:'paid',createdAt:now,txId:String(txId),txDate};
  });
  syerHistory.push(...newRecs);
  saveAll();saveSyer();render();
  alert('✅ Pembahagian berjaya direkod!\nPool Syer: RM '+syerPool.toFixed(2)+'\n'+newRecs.map(r=>r.name+': RM '+r.amount).join('\n')+'\n\n📊 Auto masuk Transaksi Harian ('+txDate+')');
};

window.markSyerPaid=id=>{
  const h=syerHistory.find(x=>x.id===id);
  if(h){h.status='paid';h.paidAt=new Date().toLocaleString('ms-MY');}
  saveSyer();render();
};
window.delSyerHistory=id=>{
  if(!confirm('Padam rekod ini?'))return;
  // Padam transaksi berkaitan juga
  const h=syerHistory.find(x=>x.id===id);
  if(h&&h.txId){tx=tx.filter(t=>String(t.id)!==String(h.txId));saveAll();}
  syerHistory=syerHistory.filter(x=>x.id!==id);saveSyer();render();
};

window.syerAutoFill=function(){
  const sel=document.getElementById('smName');
  const v=sel.value;
  const customWrap=document.getElementById('smCustomWrap');
  if(v==='__custom__'){customWrap.style.display='block';document.getElementById('smPct').value=0;}
  else{
    customWrap.style.display='none';
    const opt=sel.options[sel.selectedIndex];
    const pct=opt?+(opt.getAttribute('data-pct')||0):0;
    document.getElementById('smPct').value=pct;
    syerAutoCalc();
  }
};

window.syerAutoCalc=function(){
  // Auto-kira jumlah berdasarkan % dan Net Profit bulan ini
  const pct=+(document.getElementById('smPct')?.value||0);
  if(!pct)return;
  const mKey=syerMonth;
  const mTx=tx.filter(t=>t.date&&t.date.startsWith(mKey));
  const mIncome=mTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExpense=mTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const netProfit=mIncome-mExpense;
  const syerPool=netProfit*(syerCfg.syerPct/100);
  const amt=+(syerPool*(pct/100)).toFixed(2);
  const amtEl=document.getElementById('smAmt');
  if(amtEl)amtEl.value=amt>0?amt:0;
};

window.saveSyerManual=function(){
  const sel=document.getElementById('smName');
  const isCustom=sel.value==='__custom__';
  const name=isCustom?(document.getElementById('smCustomName')?.value||'').trim():sel.value;
  const pct=+(document.getElementById('smPct')?.value||0);
  const amt=+(document.getElementById('smAmt')?.value||0);
  const date=(document.getElementById('smDate')?.value||'');
  const notesVal=(document.getElementById('smNotes')?.value||'').trim();
  const linkTx=document.getElementById('smLinkTx')?.checked;

  render();

  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    var prev=document.getElementById('sfPhotoPreview');
    if(prev){
      prev.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
      prev._photoData=e.target.result;
    }
    var modal=document.getElementById('staffModal');
    if(modal)modal._photoData=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
};

// MALAYSIA TIME
// ================================================================
function myNow(){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000);}
function myToday(){const d=myNow();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function myDtLocal(){const d=myNow();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}`;}
function parseMY(s){if(!s)return new Date();const p=s.replace('T',' ').split(/[- :]/);return new Date(Date.UTC(+p[0],+p[1]-1,+p[2],+p[3]-8,+(p[4]||0),0));}
function myHour(iso){const d=new Date(iso);if(isNaN(d.getTime()))return 0;const my=new Date(d.getTime()+d.getTimezoneOffset()*60000+28800000);return my.getHours();}
function fmtT(iso){
  if(!iso)return'-';try{const d=new Date(iso);if(isNaN(d.getTime()))return'-';
  const my=new Date(d.getTime()+d.getTimezoneOffset()*60000+28800000);
  let h=my.getHours(),m=my.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return`${p2(h)}:${p2(m)} ${ap}`;
  }catch(e){return'-';}}
function fmtDate(s){if(!s)return'-';const mn=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'],p=s.split('-');return`${+p[2]} ${mn[+p[1]-1]} ${p[0]}`;}
function fmtMon(s){if(!s)return'-';const mn=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'],p=s.split('-');return`${mn[+p[1]-1]} ${p[0]}`;}
function getRemMs(b){if(!b||!b.et)return 0;const e=new Date(b.et);return isNaN(e.getTime())?0:e.getTime()-new Date().getTime();}
function fmtCd(ms){if(!ms||isNaN(ms)||ms<=0)return'00:00:00';return[Math.floor(ms/3600000),Math.floor((ms%3600000)/60000),Math.floor((ms%60000)/1000)].map(n=>p2(n)).join(':');}
function p2(n){return String(+n||0).padStart(2,'0');}

// ================================================================
// CALCULATIONS
// ================================================================
function calcBase(sid,players,dur,loyalty,isoSt){
  if(loyalty)return 0;
  const s=STATIONS.find(x=>x.id===sid);if(!s)return 0;
  let base=RATES[s.type]?.[players]?.[dur]||0;
  // Peak hours
  if(PEAK.enabled&&isoSt){
    const h=myHour(isoSt);
    const pk=PEAK.hours.find(p=>h>=p.start&&h<p.end);
    if(pk)base=Math.round(base*pk.mult);
  }
  // Discount
  // Promo Weekday (Mon-Fri)
  if(PROMO_WEEKDAY.enabled&&isoSt){
    const d=new Date(isoSt);
    const my=new Date(d.getTime()+d.getTimezoneOffset()*60000+28800000);
    const dow=my.getDay(); // 0=Sun,1=Mon..5=Fri,6=Sat
    const h=my.getHours();
    if(dow>=1&&dow<=5&&h>=PROMO_WEEKDAY.startH&&h<PROMO_WEEKDAY.endH){
      const s=STATIONS.find(x=>x.id===sid);
      const promoRate=s?PROMO_WEEKDAY.rates[s.type]?.[players]:null;
      if(promoRate!=null) return promoRate;
    }
  }
  if(DISCOUNTS.pct>0)base=Math.round(base*(1-DISCOUNTS.pct/100));
  return base;
}
function calcX(f){let x=0;if(f.xDS4)x+=5;if(f.xDS5)x+=8;return x;}
function calcTot(f){return calcBase(f.sid,f.players,f.dur,f.loyalty,f.st)+calcX(f);}
function r1h(sid,players){const s=STATIONS.find(x=>x.id===sid);return s?RATES[s.type]?.[players]?.[1]||0:0;}
function ctLabel(players,payment){return`${players}P ${payment.toUpperCase()}`;}
function getAB(sid,date){return bks.filter(b=>b.sid===sid&&b.date===date&&b.status!=='x').sort((a,b)=>new Date(b.st)-new Date(a.st))[0]||null;}
function isBusy(sid,excl=null){const now=Date.now();return bks.some(b=>b.sid===sid&&b.status==='a'&&new Date(b.st)<=now&&new Date(b.et)>now&&b.id!==excl);}
function hasOvlp(sid,date,st,et,excl=null){const s=new Date(st).getTime(),e=new Date(et).getTime();return bks.some(b=>b.sid===sid&&b.date===date&&b.status==='a'&&b.id!==excl&&s<new Date(b.et).getTime()&&e>new Date(b.st).getTime());}
function slotOf(isoSt){const h=myHour(isoSt);if(h>=10&&h<12)return'Pagi';if(h>=12&&h<17)return'Petang';if(h>=17&&h<20)return'Malam';return'Lain';}

function beepContinuous(secs){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
    o.frequency.value=880;g.gain.value=0;
    const now=ac.currentTime,bip=0.2,gap=0.3;
    for(let i=0;i<Math.ceil(secs/(bip+gap));i++){
      g.gain.setValueAtTime(.3,now+i*(bip+gap));
      g.gain.setValueAtTime(0,now+i*(bip+gap)+bip);
    }
    o.start();o.stop(now+secs);
  }catch(e){}
}
function speak(txt){try{const u=new SpeechSynthesisUtterance(txt);u.lang='ms-MY';u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}

function getFilteredList(){
  const now=new Date(),todStr=myToday();
  const d=myNow();
  const weekStart=new Date(d);weekStart.setDate(d.getDate()-d.getDay());
  const wStr=`${weekStart.getFullYear()}-${p2(weekStart.getMonth()+1)}-${p2(weekStart.getDate())}`;
  const monStr=`${d.getFullYear()}-${p2(d.getMonth()+1)}`;

  let fil=bks.filter(b=>b.status!=='x');
  if(lFilt.period==='today')fil=fil.filter(b=>b.date===todStr);

  else if(lFilt.period==='week')fil=fil.filter(b=>b.date>=wStr);
  else if(lFilt.period==='month')fil=fil.filter(b=>b.date.startsWith(monStr));
  else if(lFilt.period==='custom')fil=fil.filter(b=>b.date===lDate);
  if(lFilt.status==='aktif')fil=fil.filter(b=>b.status==='a');
  else if(lFilt.status==='selesai')fil=fil.filter(b=>b.status==='s');
  if(lFilt.type==='ps5')fil=fil.filter(b=>STATIONS.find(s=>s.id===b.sid)?.type==='PS5');
  else if(lFilt.type==='ps4')fil=fil.filter(b=>STATIONS.find(s=>s.id===b.sid)?.type==='PS4');
  else if(lFilt.type==='1p')fil=fil.filter(b=>b.players===1);
  else if(lFilt.type==='2p')fil=fil.filter(b=>b.players===2);
  if(lFilt.payment!=='all')fil=fil.filter(b=>(b.payment||'cash')===lFilt.payment);
  return fil.sort((a,b)=>new Date(b.st)-new Date(a.st));
}

    </div>

function rAnal(){
  const dayFil=bks.filter(b=>b.date===aDate&&b.status!=='x');
  const dayTot=dayFil.reduce((s,b)=>s+b.amt,0);

  // Daily charts
  function mkBars(labels,vals,colors,maxV,title,isAmt=true){
    const H=90;const bars=labels.map((l,i)=>{const v=vals[l]||0;const h=Math.max(2,Math.round((v/(maxV||1))*H));const c=Array.isArray(colors)?colors[i%colors.length]:colors;const tip=isAmt?`RM${v.toFixed(2)}`:`${v}x`;return`<div class="bc"><div class="bv">${isAmt&&v>0?'RM'+Math.round(v):v>0?v:''}</div><div class="bb" style="height:${h}px;background:${c}" data-v="${tip}"></div><div class="bl">${l.length>6?l.slice(0,5)+'…':l}</div></div>`;}).join('');
    return`<div class="cw"><div class="cw-t">${title}</div><div class="bar-area" style="height:${H+35}px">${bars}</div></div>`;
  }

  const stRev={};STATIONS.forEach(s=>{stRev[`St${s.id}`]=0;});
  dayFil.forEach(b=>{stRev[`St${b.sid}`]=(stRev[`St${b.sid}`]||0)+b.amt;});
  const stColors=STATIONS.map(s=>s.type==='PS5'?'#3b82f6':'#10b981');
  const maxStR=Math.max(...Object.values(stRev),1);

  const slotRev={Pagi:0,Petang:0,Malam:0};
  dayFil.forEach(b=>{const sl=slotOf(b.st)||'Lain';if(slotRev[sl]!==undefined)slotRev[sl]+=b.amt;});
  const playerRev={1:0,2:0};dayFil.forEach(b=>{playerRev[b.players]=(playerRev[b.players]||0)+b.amt;});
  const payRev={cash:0,qr:0,fpx:0};dayFil.forEach(b=>{payRev[b.payment||'cash']=(payRev[b.payment||'cash']||0)+b.amt;});
  const ps5r=dayFil.filter(b=>STATIONS.find(s=>s.id===b.sid)?.type==='PS5').reduce((s,b)=>s+b.amt,0);
  const ps4r=dayFil.filter(b=>STATIONS.find(s=>s.id===b.sid)?.type==='PS4').reduce((s,b)=>s+b.amt,0);

  const c1=mkBars(STATIONS.map(s=>`St${s.id}`),stRev,stColors,maxStR,'📊 Hasil per Station (RM)');
  const c2=mkBars(['Pagi','Petang','Malam'],slotRev,['#f59e0b','#10b981','#8b5cf6'],Math.max(...Object.values(slotRev),1),'⏰ Slot Masa (RM)');
  const c3=mkBars(['1P','2P'],{'1P':playerRev[1],'2P':playerRev[2]},['#3b82f6','#ef4444'],Math.max(playerRev[1],playerRev[2],1),'👥 1P vs 2P (RM)');
  const c4=mkBars(['Cash','QR','FPX'],{'Cash':payRev.cash,'QR':payRev.qr,'FPX':payRev.fpx},['#16a34a','#7c3aed','#0ea5e9'],Math.max(...Object.values(payRev),1),'💳 Kaedah Bayaran (RM)');
  const c5=mkBars(['PS5','PS4'],{'PS5':ps5r,'PS4':ps4r},['#3b82f6','#10b981'],Math.max(ps5r,ps4r,1),'🎮 PS5 vs PS4 (RM)');

  // Hourly
  const hrly={};for(let h=9;h<=22;h++)hrly[h]=0;
  dayFil.forEach(b=>{const h=myHour(b.st);if(hrly[h]!==undefined)hrly[h]+=b.amt;});
  const hrVals=Object.keys(hrly);const maxHr=Math.max(...hrVals.map(h=>hrly[h]),1);const H2=80;
  const hrBars=hrVals.map(h=>{const v=hrly[h];const ht=Math.max(2,Math.round((v/maxHr)*H2));const col=h>=10&&h<12?'#f59e0b':h>=12&&h<17?'#10b981':h>=17&&h<20?'#8b5cf6':'#d1d5db';return`<div class="bc"><div class="bv" style="font-size:8px">${v>0?'RM'+Math.round(v):''}</div><div class="bb" style="height:${ht}px;background:${col}" data-v="RM${v.toFixed(2)}"></div><div class="bl" style="font-size:8px">${h}:00</div></div>`;}).join('');

  // Monthly analytics
  const selYear=+aMonth.split('-')[0];const selMon=+aMonth.split('-')[1]-1;
  const months=[];for(let i=11;i>=0;i--){const d=new Date(selYear,selMon-i,1);months.push(`${d.getFullYear()}-${p2(d.getMonth()+1)}`);}
  const monRev={};const monCnt={};months.forEach(m=>{monRev[m]=0;monCnt[m]=0;});
  bks.filter(b=>b.status!=='x').forEach(b=>{const m=b.date.slice(0,7);if(monRev[m]!==undefined){monRev[m]+=b.amt;monCnt[m]++;}});
  const maxMon=Math.max(...months.map(m=>monRev[m]),1);const HM=100;
  const monBars=months.map((m,i)=>{const v=monRev[m];const ht=Math.max(2,Math.round((v/maxMon)*HM));return`<div class="bc"><div class="bv">${v>0?'RM'+Math.round(v):''}</div><div class="bb" style="height:${ht}px;background:${i>=months.length-3?'#2563eb':'#93c5fd'}" data-v="RM${v.toFixed(2)} (${monCnt[m]} bk)"></div><div class="bl" style="font-size:9px">${fmtMon(m)}</div></div>`;}).join('');

  const monRows=months.map(m=>{const v=monRev[m];const c=monCnt[m];if(!c)return'';const ps5m=bks.filter(b=>b.date.startsWith(m)&&b.status!=='x'&&STATIONS.find(s=>s.id===b.sid)?.type==='PS5').reduce((s,b)=>s+b.amt,0);const ps4m=v-ps5m;return`<tr><td>${fmtMon(m)}</td><td>${c}</td><td style="font-weight:700;color:var(--blue)">RM ${v.toFixed(2)}</td><td>RM ${ps5m.toFixed(2)}</td><td>RM ${ps4m.toFixed(2)}</td></tr>`;}).filter(Boolean).join('');

  document.getElementById('bk-vAnal').innerHTML=`<div class="card">
    <div class="ch"><div class="ct">📈 Analisis</div></div>
    <div class="cs">
      <!-- DAILY -->
      <div class="anal-section-title">📅 Analisis Harian
        <input type="date" class="fb" value="${aDate}" style="font-size:12px;padding:5px 10px" onchange="aDate=this.value;rAnal()">
        <span style="font-size:12px;color:var(--t2);font-weight:600">${fmtDate(aDate)}</span>
      </div>
      <div class="sum-row">
        <div class="smc"><div class="smc-v" style="color:var(--blue)">${dayFil.length}</div><div class="smc-l">Booking</div></div>
        <div class="smc"><div class="smc-v" style="color:var(--green)">RM ${dayTot.toFixed(2)}</div><div class="smc-l">Hasil</div></div>
        <div class="smc"><div class="smc-v" style="color:#3b82f6">RM ${ps5r.toFixed(2)}</div><div class="smc-l">PS5</div></div>
        <div class="smc"><div class="smc-v" style="color:#10b981">RM ${ps4r.toFixed(2)}</div><div class="smc-l">PS4</div></div>
      </div>
      <div class="cgrid">${c1}${c2}${c3}${c4}</div>
      <div style="margin-top:14px">${c5}</div>
      <div class="cw" style="margin-top:14px">
        <div class="cw-t">🕐 Hasil Mengikut Jam</div>
        <div class="bar-area" style="height:${H2+35}px;gap:3px">${hrBars}</div>
        <div class="cl"><div class="cli"><div class="cld" style="background:#f59e0b"></div>Pagi (10-11am)</div><div class="cli"><div class="cld" style="background:#10b981"></div>Petang (12-4pm)</div><div class="cli"><div class="cld" style="background:#8b5cf6"></div>Malam (5-8pm)</div></div>
      </div>

      <!-- MONTHLY SEPARATOR -->
      <div class="anal-sep"></div>
      <div class="anal-section-title">📆 Analisis Bulanan / Tahunan
        <input type="month" class="fb" value="${aMonth}" style="font-size:12px;padding:5px 10px" onchange="aMonth=this.value;rAnal()">
        <span style="font-size:12px;color:var(--t2);font-weight:600">12 bulan terakhir</span>
      </div>
      <div class="cw">
        <div class="cw-t">📊 Hasil Bulanan (RM) — 12 Bulan</div>
        <div class="bar-area" style="height:${HM+35}px;gap:4px">${monBars}</div>
        <div class="cl">
          <div class="cli"><div class="cld" style="background:#2563eb"></div>3 Bulan Terkini</div>
          <div class="cli"><div class="cld" style="background:#93c5fd"></div>Bulan Sebelumnya</div>
        </div>
      </div>
      <div class="cw">
        <div class="cw-t">📋 Jadual Bulanan</div>
        <div class="tw"><table class="mon-table">
          <thead><tr><th>Bulan</th><th>Booking</th><th>Hasil</th><th>PS5</th><th>PS4</th></tr></thead>
          <tbody>${monRows||`<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t3)">Tiada data</td></tr>`}</tbody>
        </table></div>
      </div>
    </div>
  </div>`;
}

var ovTimer = null;

for(var _oi=0;_oi<10;_oi++){
  OV_STATIONS.push({id:_oi+1,name:'Station '+(_oi+1),type:_oi<5?'PS5':'PS4'});
}
var ovBks = [];

function ovLoadData(){
  try{
    var d=localStorage.getItem('psbook_v1');
    if(d){var p=JSON.parse(d);ovBks=p.bks||[];}
  }catch(e){}
}

function ovGetActive(sid){
  var now=Date.now();
  var active=ovBks.filter(function(b){
    return b.sid===sid&&b.status==='a'&&new Date(b.st)<=now&&new Date(b.et)>now;
  }).sort(function(a,b){return new Date(a.et)-new Date(b.et);});
  return active[0]||null;
}

function ovFmtCd(ms){
  if(!ms||isNaN(ms)||ms<=0)return'00:00';
  var h=Math.floor(ms/3600000);
  var m=Math.floor((ms%3600000)/60000);
  var s=Math.floor((ms%60000)/1000);
  if(h>0) return p2ov(h)+':'+p2ov(m)+':'+p2ov(s);
  return p2ov(m)+':'+p2ov(s);
}
function p2ov(n){return String(+n||0).padStart(2,'0');}

function ovMyNow(){
  var n=new Date();
  return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000);
}

function renderPsOverlay(){
  ovLoadData();
  var freeC=0, usedC=0, warnC=0;

  var stationsHtml = OV_STATIONS.map(function(s){
    var b=ovGetActive(s.id);
    var rem=b?(new Date(b.et).getTime()-Date.now()):0;
    var isFree=!b||rem<=0;
    var isWarn=b&&rem>0&&rem<300000;
    if(isFree) freeC++;
    else if(isWarn){ usedC++; warnC++; }
    else usedC++;
    var cls=isFree?'ov-free':(isWarn?'ov-warn':'ov-used');
    var timerHtml=isFree
      ?'<div class="ov-s-timer ov-ready">READY</div>'
      :'<div class="ov-s-timer" id="ov-tmr-'+s.id+'">'+ovFmtCd(rem)+'</div>';
    var pay=b?({'cash':'💵','qr':'📱','fpx':'🏦'}[b.payment||'cash']||''):'';
    var pInfo=b?(b.players||1)+'P '+pay:'';
    return '<div class="ov-station '+cls+'" id="ov-st-'+s.id+'">'
      +'<div class="ov-s-num">Station '+s.id+'</div>'
      +'<div class="ov-s-type">'+s.type+'</div>'
      +timerHtml
      +(b?'<div class="ov-s-info">'+pInfo+'</div>':'')
      +'</div>';
  }).join('');

  var tickerItems=[
    'MAIDA ESPORTS',
    '🎮 SELAMAT DATANG KE MAIDA ESPORTS',
    '📺 PAPARAN STESEN LANGSUNG',
    '✅ '+freeC+' STESEN TERSEDIA',
    '🕹️ BOOK SEKARANG DI KAUNTER',
    '🏆 MAIDA LEGACY · LA0083119-X',
    '📍 FINANCIAL PARK LABUAN'
  ];
  var tickerTxt=tickerItems.map(function(t){
    return '<span class="ov-ticker-txt">'+t+'</span><span class="ov-ticker-sep">✦</span>';
  }).join('');

  var now=ovMyNow();
  var days=['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
  var mons=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
  var timeStr=p2ov(now.getHours())+':'+p2ov(now.getMinutes())+':'+p2ov(now.getSeconds());
  var dateStr=days[now.getDay()]+', '+now.getDate()+' '+mons[now.getMonth()]+' '+now.getFullYear();
  var totRev=ovBks.reduce(function(s,b){return s+(b.amt||0);},0);

  return '<div class="top-bar" style="position:sticky;top:0;z-index:40">'
    +'<div class="tb-row1">'
    +'<div style="font-size:15px;font-weight:900">📺 PS Overlay — Live Monitor</div>'
    +'<button class="btn sm" onclick="ovLoadData();ovRenderFull()" style="gap:6px">🔄 Refresh</button>'
    +'</div></div>'
    +'<div style="padding:14px 14px 80px">'
    +'<div class="ov-wrap">'
    // Header
    +'<div class="ov-header">'
    +'<div>'
    +'<div class="ov-title">MAIDA <span>ESPORTS</span></div>'
    +'<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1px;margin-top:2px">LIVE STATION MONITOR</div>'
    +'</div>'
    +'<div class="ov-badges">'
    +'<div class="ov-badge"><div class="ov-badge-dot" style="background:#1db954"></div><span class="ov-badge-txt" id="ov-free-c">'+freeC+' FREE</span></div>'
    +'<div class="ov-badge"><div class="ov-badge-dot" style="background:#e53935"></div><span class="ov-badge-txt" id="ov-used-c">'+usedC+' IN USE</span></div>'
    +(warnC?'<div class="ov-badge" style="border-color:#e67e22"><div class="ov-badge-dot" style="background:#e67e22;animation:ovBlink .6s infinite"></div><span class="ov-badge-txt" style="color:#e67e22">'+warnC+' HAMPIR TAMAT</span></div>':'')
    +'<div class="ov-live-dot"></div>'
    +'<div class="ov-clock" id="ov-clk">'+timeStr+'</div>'
    +'</div></div>'
    // Station grid
    +'<div class="ov-grid" id="ov-grid">'+stationsHtml+'</div>'
    // Ticker
    +'<div class="ov-ticker"><div class="ov-ticker-track" id="ov-ticker">'+tickerTxt+tickerTxt+'</div></div>'
    // Footer stats
    +'<div class="ov-footer">'
    +'<div class="ov-stat"><div class="ov-stat-val" style="color:#1db954">'+freeC+'</div><div class="ov-stat-lbl">Stesen Kosong</div></div>'
    +'<div class="ov-stat"><div class="ov-stat-val" style="color:#e53935">'+usedC+'</div><div class="ov-stat-lbl">Sedang Digunakan</div></div>'

    +'<div class="ov-stat"><div class="ov-stat-val" style="color:#d97706">RM '+totRev.toFixed(2)+'</div><div class="ov-stat-lbl">Hasil Terkumpul</div></div>'
    +'</div>'
    +'</div></div>';
}

function ovRenderFull(){
  var root=document.getElementById('root');
  if(root) root.innerHTML=renderPsOverlay();
  ovStart();
}

function ovStart(){
  ovStop();
  ovTimer=setInterval(function(){
    // Update timers & clock
    var clk=document.getElementById('ov-clk');
    if(!clk)return; // Tab changed
    var now=ovMyNow();
    function p2ov2(n){return String(+n||0).padStart(2,'0');}
    clk.textContent=p2ov2(now.getHours())+':'+p2ov2(now.getMinutes())+':'+p2ov2(now.getSeconds());
    // Update each station timer
    OV_STATIONS.forEach(function(s){
      var b=ovGetActive(s.id);
      var tmrEl=document.getElementById('ov-tmr-'+s.id);
      var stEl=document.getElementById('ov-st-'+s.id);
      if(!tmrEl||!stEl)return;
      if(b){
        var rem=new Date(b.et).getTime()-Date.now();
        if(rem>0){
          tmrEl.textContent=ovFmtCd(rem);
          var isWarn=rem<300000;
          stEl.className='ov-station '+(isWarn?'ov-warn':'ov-used');
        }else{
          // Expired — full re-render
          ovLoadData(); ovRenderFull();
        }
      }
    });
    // Full reload every 10s
    if(!ovTimer._tick) ovTimer._tick=0;
    ovTimer._tick++;
    if(ovTimer._tick%10===0){ ovLoadData(); ovRenderFull(); }
  },1000);
}

function ovStop(){
  if(ovTimer){ clearInterval(ovTimer); ovTimer=null; }
}
