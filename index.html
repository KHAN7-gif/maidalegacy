<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MDE Finance Pro | Maida Legacy</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===================== RESET & VARS ===================== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --p:#5b5bd6;
  --p-lt:#ededff;
  --p-md:#c7c7f5;
  --green:#16a34a;
  --green-lt:#dcfce7;
  --red:#dc2626;
  --red-lt:#fee2e2;
  --amber:#d97706;
  --amber-lt:#fef3c7;
  --t1:#1c1c1e;
  --t2:#636366;
  --t3:#aeaeb2;
  --border:#e5e5ea;
  --sh-sm:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 20px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04);
  --sh-lg:0 12px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.05);
  --r-xl:22px;--r-lg:16px;--r-md:12px;--r-sm:8px;--r-full:999px;
}
body{
  background:var(--bg);
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--t1);min-height:100vh;font-size:14px;
}

/* ===================== LAYOUT ===================== */
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
.content{padding-bottom:112px}

/* ===================== TOP NAV BAR ===================== */
.top-bar{
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:12px 16px 0;position:sticky;top:0;z-index:60;
}
.tb-row1{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.tb-title{font-size:17px;font-weight:800;color:var(--t1)}
.tb-month-nav{display:flex;align-items:center;gap:6px}
.nav-pill{
  display:flex;align-items:center;gap:4px;
  background:var(--p-lt);border:none;border-radius:var(--r-full);
  padding:7px 12px;font-size:13px;font-weight:700;color:var(--p);
  cursor:pointer;font-family:inherit;transition:background .15s
}
.nav-pill:hover{background:var(--p-md)}
.nav-arr{
  width:30px;height:30px;border-radius:50%;background:var(--p-lt);
  border:none;color:var(--p);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .15s
}
.nav-arr:hover{background:var(--p-md)}
.tb-row2{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  border-top:1px solid var(--border);padding:10px 0
}
.tb-stat{text-align:center}
.tb-stat-lbl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:2px}
.tb-stat-val{font-size:16px;font-weight:900}
.tv-in{color:var(--green)}.tv-ex{color:var(--red)}.tv-bal{color:var(--t1)}
.tv-neg{color:var(--red)}

/* ===================== SECTION TITLE ===================== */
.sec-hdr{
  padding:16px 16px 10px;
  display:flex;align-items:center;justify-content:space-between
}
.sec-title{font-size:15px;font-weight:800;color:var(--t1)}
.sec-sub{font-size:13px;font-weight:700;color:var(--t2)}

/* ===================== CARDS ===================== */
.card{
  background:var(--card);border-radius:var(--r-xl);
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  overflow:hidden
}
.mx{margin:0 12px 14px}

/* ===================== PROFILE / HOME ===================== */
.profile-hero{
  background:linear-gradient(145deg,#ededff,#e0e7ff,#f2f2f7);
  padding:28px 20px 22px;text-align:center;
  border-bottom:1px solid var(--border)
}
.profile-avatar{
  width:68px;height:68px;background:var(--card);border-radius:18px;
  margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
  font-size:32px;box-shadow:var(--sh-md)
}
.profile-name{font-size:19px;font-weight:900;letter-spacing:-.3px}
.profile-stats{display:flex;margin-top:16px;border-top:1px solid var(--p-md);padding-top:14px}
.ps-item{flex:1;text-align:center}
.ps-item+.ps-item{border-left:1px solid var(--p-md)}
.ps-val{font-size:22px;font-weight:900}
.ps-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.premium-wrap{margin:12px}
.premium-banner{
  display:flex;border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--sh-sm);cursor:pointer
}
.prem-l{
  flex:1;background:#fbbf24;padding:13px 16px;
  display:flex;align-items:center;gap:10px
}
.prem-l-txt{font-size:14px;font-weight:800;color:#92400e}
.prem-r{
  background:#4c4c9e;padding:13px 18px;
  display:flex;align-items:center;
  color:#fbbf24;font-size:13px;font-weight:800;white-space:nowrap
}

.menu-card{background:var(--card);border-radius:var(--r-xl);margin:0 12px 14px;overflow:hidden;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.menu-row{
  display:flex;align-items:center;gap:13px;padding:13px 16px;
  border-bottom:1px solid #f2f2f7;cursor:pointer;transition:background .15s
}
.menu-row:last-child{border-bottom:none}
.menu-row:hover{background:#fafafa}
.m-icon{
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0
}
.m-label{flex:1;font-size:15px;font-weight:600}
.m-badge{font-size:12px;font-weight:700;color:var(--red)}
.m-arr{font-size:13px;color:var(--t3)}

/* ===================== CALENDAR ===================== */
.cal-card{background:var(--card);border-radius:var(--r-xl);margin:0 12px 14px;box-shadow:var(--sh-sm);border:1px solid var(--border);overflow:hidden}
.cal-dn{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 10px 4px}
.cal-dn-cell{text-align:center;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0 10px 10px;background:var(--bg)}
.cal-day{
  background:var(--card);min-height:60px;padding:5px 4px 4px;
  cursor:pointer;text-align:center;transition:background .12s;border-radius:var(--r-sm)
}
.cal-day:hover{background:var(--p-lt)}
.cal-day.cal-today{background:#fbbf24;border-radius:var(--r-sm)}
.cal-day.cal-today .cal-num{color:#fff;font-weight:900}
.cal-day.cal-empty{background:transparent;cursor:default;opacity:.25}
.cal-day.cal-empty:hover{background:transparent}
.cal-num{font-size:13px;font-weight:700;color:var(--p);margin-bottom:3px;line-height:1}
.cal-day.cal-empty .cal-num{color:var(--t3);font-weight:400}
.cal-inc{font-size:9px;font-weight:700;color:var(--green);line-height:1.3;word-break:break-word;text-align:center}
.cal-exp{font-size:9px;font-weight:700;color:var(--red);line-height:1.3;word-break:break-word;text-align:center}
.cal-dot{width:5px;height:5px;background:var(--amber);border-radius:50%;margin:2px auto 0}
.cal-plus{
  display:inline-block;font-size:9px;background:var(--p-lt);color:var(--p);
  border-radius:4px;padding:1px 4px;margin-top:2px;border:none;cursor:pointer;font-family:inherit;font-weight:700
}

/* ===================== WEEKLY ANALYSIS ===================== */
.week-card{
  background:var(--card);border-radius:var(--r-lg);margin:0 12px 8px;
  padding:13px 14px;box-shadow:var(--sh-sm);border:1px solid var(--border);
  position:relative;cursor:help;transition:box-shadow .15s
}
.week-card:hover{box-shadow:var(--sh-md)}
.week-card.wk-best{border-color:#86efac;background:#f0fdf4}
.week-card.wk-low{border-color:#fca5a5;background:#fff5f5}
.wk-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wk-lbl{font-size:13px;font-weight:700;color:var(--t1)}
.wk-amt{font-size:15px;font-weight:900;color:var(--green)}
.wk-badge{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-full);
  display:inline-flex;align-items:center;gap:3px;margin-left:6px
}
.wk-best-badge{background:var(--green-lt);color:var(--green)}
.wk-low-badge{background:var(--red-lt);color:var(--red)}
.wk-tooltip{
  position:absolute;bottom:calc(100% + 6px);left:10px;right:10px;
  background:rgba(28,28,30,.9);color:#fff;border-radius:10px;
  padding:7px 12px;font-size:11px;z-index:20;pointer-events:none;
  opacity:0;transition:opacity .2s;line-height:1.6
}
.week-card:hover .wk-tooltip{opacity:1}

/* PERF card */
.perf-card{
  background:var(--card);border-radius:var(--r-lg);margin:0 12px 8px;
  padding:14px 16px;box-shadow:var(--sh-sm);border:1px solid var(--border)
}
.perf-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:4px}
.perf-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.perf-amt{font-size:24px;font-weight:900}
.perf-badge{padding:5px 12px;border-radius:var(--r-full);font-size:12px;font-weight:800;display:inline-block}
.pb-good{background:var(--green-lt);color:var(--green)}
.pb-mod{background:var(--amber-lt);color:var(--amber)}
.perf-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ps-box{background:#f9fafb;border-radius:var(--r-sm);padding:8px 10px}
.psb-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:3px}
.psb-val{font-size:13px;font-weight:900}

/* SUGGEST card */
.suggest-card{
  background:linear-gradient(135deg,#ededff,#dde4ff);
  border-radius:var(--r-lg);margin:0 12px 14px;
  padding:14px 16px;border:1px solid var(--p-md)
}
.sug-title{font-size:13px;font-weight:800;color:var(--p);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sug-body{font-size:12px;line-height:1.65;color:#3730a3}

/* ===================== ANALYTIC — CATEGORY GRID ===================== */
.cat-sec-hdr{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:14px 16px 8px
}
.cat-sec-type{font-size:13px;color:var(--t2);font-weight:600}
.cat-sec-amt{font-size:17px;font-weight:900}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding:0 12px 12px}
.cat-item{
  background:var(--card);border-radius:var(--r-lg);padding:13px 6px 11px;
  text-align:center;box-shadow:var(--sh-sm);border:1px solid var(--border);
  cursor:pointer;transition:all .18s
}
.cat-item:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--p-md)}
.cat-item.cat-active{outline:2px solid var(--p);outline-offset:1px}
.cat-ico{
  width:42px;height:42px;border-radius:50%;margin:0 auto 7px;
  display:flex;align-items:center;justify-content:center;font-size:20px
}
.cat-name{font-size:10px;font-weight:600;color:var(--t2);margin-bottom:5px;line-height:1.3;min-height:24px;display:flex;align-items:center;justify-content:center}
.cat-amt-val{font-size:13px;font-weight:900}
/* icon bg colours */
.ci-or{background:#fff3e0}.ci-bl{background:#dbeafe}.ci-gr{background:#dcfce7}
.ci-pu{background:#ede9fe}.ci-re{background:#fee2e2}.ci-te{background:#ccfbf1}
.ci-pk{background:#fce7f3}.ci-ye{background:#fef9c3}.ci-in{background:#e0e7ff}
.ci-cy{background:#cffafe}.ci-li{background:#f0fdf4}

/* MoM cards */
.mom-row{display:flex;gap:10px;padding:0 12px 14px}
.mom-card{
  flex:1;background:var(--card);border-radius:var(--r-lg);padding:14px;
  box-shadow:var(--sh-sm);border:1px solid var(--border)
}
.mom-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t2);margin-bottom:5px}
.mom-amt{font-size:19px;font-weight:900;margin-bottom:6px}
.trend-pill{
  display:inline-flex;align-items:center;gap:3px;padding:3px 9px;
  border-radius:var(--r-full);font-size:11px;font-weight:800
}
.tp-up{background:var(--green-lt);color:var(--green)}
.tp-dn{background:var(--red-lt);color:var(--red)}

/* Filtered tx card */
.ftx-card{background:var(--card);border-radius:var(--r-xl);margin:0 12px 14px;overflow:hidden;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.ftx-hdr{padding:13px 16px;font-size:14px;font-weight:800;border-bottom:1px solid var(--border)}

/* ===================== RECORD ===================== */
.rec-wrap{padding:0 12px 12px}
.filter-card{background:var(--card);border-radius:var(--r-xl);padding:14px;margin-bottom:12px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.fg{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:9px}
.fi{flex:1;min-width:120px}
.fi label{font-size:10px;font-weight:700;color:var(--t3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fi-in,.fi-sel{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);
  border-radius:var(--r-full);font-size:13px;background:#fafafa;
  color:var(--t1);font-family:inherit;outline:none;transition:border-color .2s
}
.fi-in:focus,.fi-sel:focus{border-color:var(--p);background:#fff}
.insight-bar{
  background:var(--p-lt);border-radius:var(--r-md);padding:11px 13px;
  margin-bottom:10px;font-size:12px;color:#3730a3;font-weight:600
}
.bulk-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.tbl-wrap{overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{
  background:#f9fafb;padding:10px 11px;text-align:left;position:sticky;top:0;
  font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);
  border-bottom:1px solid var(--border)
}
td{padding:10px 11px;border-bottom:1px solid #f3f4f6;color:var(--t1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.type-badge{padding:3px 9px;border-radius:var(--r-full);font-size:10px;font-weight:700;display:inline-block}
.ti{background:var(--green-lt);color:var(--green)}
.te{background:var(--red-lt);color:var(--red)}
.income{color:var(--green)!important}.expense{color:var(--red)!important}
.fw8{font-weight:800}
.act-row{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.sum-row{
  display:flex;gap:10px;background:var(--card);border-radius:var(--r-lg);
  padding:13px;box-shadow:var(--sh-sm);border:1px solid var(--border);margin-top:12px
}
.sum-row>div{flex:1;text-align:center}
.sum-row .srl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:3px}
.sum-row .srv{font-size:15px;font-weight:900}

/* ===================== SUMMARY ===================== */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 12px;margin-bottom:12px}
.stat-box{background:var(--card);border-radius:var(--r-lg);padding:13px;border:1px solid var(--border);box-shadow:var(--sh-sm)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:6px}
.stat-val{font-size:18px;font-weight:900}
.score-wrap{padding:0 12px 12px}
.score-box{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  background:var(--p-lt);border-radius:var(--r-xl);padding:16px;
  border:1px solid var(--p-md)
}
.ring-wrap{position:relative;width:96px;height:96px;flex-shrink:0}
.ring-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:900;color:var(--t1)}
.score-detail{flex:1}
.score-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.score-status{font-size:18px;font-weight:900;margin-top:4px}
.ss-ex{color:var(--p)}.ss-gd{color:#2563eb}.ss-md{color:var(--amber)}.ss-pr{color:var(--red)}
.net-wrap{text-align:right}
.net-amt{font-size:20px;font-weight:900}
.trend-ind{font-size:11px;font-weight:800;padding:3px 9px;border-radius:var(--r-full);display:inline-block;margin-top:4px}
.ti-up{background:var(--green-lt);color:var(--green)}.ti-dn{background:var(--red-lt);color:var(--red)}
.chart-wrap{background:var(--card);border-radius:var(--r-xl);margin:0 12px 14px;padding:16px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.legend{display:flex;gap:18px;margin-bottom:14px;font-size:12px;font-weight:600;color:var(--t2)}
.ldot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:160px}
.bar-g{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px}
.bar-in{width:100%;background:linear-gradient(180deg,var(--green),#4ade80);border-radius:5px 5px 2px 2px;min-height:3px;transition:height .4s}
.bar-ex{width:100%;background:linear-gradient(180deg,var(--red),#f87171);border-radius:5px 5px 2px 2px;min-height:3px}
.bar-lbl{font-size:10px;font-weight:600;color:var(--t3);padding-bottom:6px;margin-top:6px}

/* ===================== BUTTONS ===================== */
.btn{border:none;border-radius:var(--r-full);padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;font-family:inherit}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(91,91,214,.28)}
.btn-p:hover{background:#4646c0}
.btn-s{background:#f3f4f6;color:var(--t1);border:1px solid var(--border)}
.btn-s:hover{background:#e9eaec}
.btn-d{background:var(--red-lt);color:var(--red)}
.btn-d:hover{background:#fca5a5}
.btn-e{background:#dbeafe;color:#1d4ed8}
.btn-e:hover{background:#bfdbfe}
.btn-del{background:var(--red-lt);color:var(--red)}
.sm{padding:5px 11px;font-size:11px}
.w100{width:100%}
input[type=checkbox]{accent-color:var(--p);width:14px;height:14px;cursor:pointer}

/* ===================== LIQUID GLASS BOTTOM NAV ===================== */
/* =============================================
   GLASS BOTTOM NAV — MAIDA LEGACY
   ============================================= */
#glassNav{
  position:fixed;left:0;right:0;bottom:0;
  padding:0 14px calc(14px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;align-items:center;gap:10px;
  z-index:100;
}
.mln-savedrow{width:min(440px,100%);display:flex;justify-content:flex-end;padding-right:4px;}
.mln-saved{
  display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:14px;color:#0f7a44;
  padding:8px 16px;border-radius:999px;background:rgba(208,244,224,.65);
  -webkit-backdrop-filter:blur(18px) saturate(180%);backdrop-filter:blur(18px) saturate(180%);
  border:1px solid rgba(255,255,255,.55);box-shadow:0 6px 18px rgba(16,122,68,.16);
}
.mln-dot{width:10px;height:10px;border-radius:50%;background:#20c060;}

/* Shared glass shell */
.mln-glass{
  width:min(440px,100%);
  background:rgba(255,255,255,.55);
  -webkit-backdrop-filter:blur(34px) saturate(135%);
  backdrop-filter:blur(34px) saturate(135%);
  border:1px solid rgba(255,255,255,.6);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 16px 44px rgba(20,25,45,.18);
}

/* ── Sub-bar ── */
.mln-subbar{
  display:flex;align-items:center;padding:10px 8px;border-radius:28px;
  transform-origin:bottom center;
}
.mln-subbar.hidden{display:none;}
.mln-pop{animation:mlnPop .34s cubic-bezier(.2,.9,.25,1.15);}
@keyframes mlnPop{
  0%{opacity:0;transform:translateY(16px) scale(.94)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.mln-stab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  border:none;background:transparent;cursor:pointer;
  font-size:12px;font-weight:700;color:#0c0c0e;
  padding:8px 4px;border-radius:18px;
  transition:color .25s,background .25s,transform .15s cubic-bezier(.2,.8,.2,1);
  font-family:inherit;
}

/* ===================== KPI / TARGETS ===================== */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 14px}
.kpi-box{background:var(--card);border-radius:var(--r-lg);padding:14px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.kpi-val{font-size:22px;font-weight:900;color:var(--t1);margin-bottom:2px}
.kpi-sub{font-size:11px;color:var(--t3);font-weight:600}
.target-bar-wrap{padding:0 12px 14px}
.target-bar-card{background:var(--card);border-radius:var(--r-xl);padding:16px 18px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.tb-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tb-title{font-size:14px;font-weight:800;color:var(--t1)}
.tb-pct{font-size:13px;font-weight:900}
.progress-track{background:#f0f0f4;border-radius:var(--r-full);height:12px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;border-radius:var(--r-full);transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.pf-green{background:linear-gradient(90deg,#16a34a,#4ade80)}
.pf-amber{background:linear-gradient(90deg,#d97706,#fbbf24)}
.pf-red{background:linear-gradient(90deg,#dc2626,#f87171)}
.target-edit-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.target-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-full);font-size:13px;font-family:inherit;outline:none;background:#fafafa}
.target-input:focus{border-color:var(--p)}

/* ===================== NOTIFICATIONS ===================== */
.notif-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid #fff}
.notif-panel{padding:0 12px 14px}
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--card);border-radius:var(--r-lg);margin-bottom:8px;box-shadow:var(--sh-sm);border-left:4px solid var(--border);transition:all .18s}
.notif-item.ni-warn{border-left-color:#d97706;background:#fffbeb}
.notif-item.ni-danger{border-left-color:#dc2626;background:#fff5f5}
.notif-item.ni-info{border-left-color:var(--p);background:var(--p-lt)}
.notif-item.ni-ok{border-left-color:#16a34a;background:#f0fdf4}
.ni-ico{font-size:20px;flex-shrink:0;margin-top:1px}
.ni-body{flex:1}
.ni-title{font-size:13px;font-weight:800;color:var(--t1)}
.ni-msg{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.55}
.ni-dismiss{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:background .15s}
.ni-dismiss:hover{background:var(--border);color:var(--t1)}

/* ===================== HEATMAP CALENDAR ===================== */
.cal-day.hm-0{background:#fff}
.cal-day.hm-1{background:#f0fdf4}
.cal-day.hm-2{background:#dcfce7}
.cal-day.hm-3{background:#bbf7d0}
.cal-day.hm-4{background:#86efac}
.cal-day.hm-5{background:#4ade80}
.cal-day.hm-6{background:#22c55e}
.cal-day.hm-7{background:#16a34a;color:#fff}
.cal-day.hm-7 .cal-num{color:#fff}
.cal-day.hm-7 .cal-inc{color:#bbf7d0}
.cal-day.hm-7 .cal-exp{color:#fecaca}
.cal-day.hm-exp{background:#fff5f5}

/* ===================== CLIENT MANAGER ===================== */
.client-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 14px}
@media(min-width:600px){.client-grid{grid-template-columns:1fr 1fr 1fr}}
.client-card{background:var(--card);border-radius:var(--r-xl);padding:14px;box-shadow:var(--sh-sm);border:1px solid var(--border);cursor:pointer;transition:all .18s;position:relative}
.client-card:hover{box-shadow:var(--sh-md);border-color:var(--p-md);transform:translateY(-2px)}
.cc-tier{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--r-full);font-size:10px;font-weight:800;margin-bottom:8px}
.cc-name{font-size:14px;font-weight:900;color:var(--t1);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-phone{font-size:11px;color:var(--t2);font-weight:600}
.cc-stats{display:flex;gap:8px;margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.cc-stat{flex:1;text-align:center}
.cc-stat-lbl{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.cc-stat-val{font-size:13px;font-weight:900;color:var(--t1);margin-top:2px}
.debt-badge{position:absolute;top:10px;right:10px;background:var(--red-lt);color:var(--red);font-size:10px;font-weight:800;padding:3px 8px;border-radius:var(--r-full)}
.client-form .dok-card{background:var(--card);border-radius:var(--r-xl);padding:16px;margin-bottom:12px;box-shadow:var(--sh-sm);border:1px solid var(--border)}

/* ===================== STOCK MANAGEMENT ===================== */
.stock-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 14px}
@media(min-width:600px){.stock-grid{grid-template-columns:repeat(3,1fr)}}
.stock-card{background:var(--card);border-radius:var(--r-xl);padding:14px;box-shadow:var(--sh-sm);border:1px solid var(--border);cursor:pointer;transition:all .18s}
.stock-card:hover{box-shadow:var(--sh-md);border-color:var(--p-md)}
.sc-ico{font-size:32px;margin-bottom:8px;display:block}
.sc-name{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:3px}
.sc-type{font-size:11px;color:var(--t2)}
.sc-status{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-full);font-size:11px;font-weight:700;margin-top:8px}
.sc-notes{font-size:11px;color:var(--t3);margin-top:6px;line-height:1.4;font-style:italic}
.stock-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 14px}
.stock-stat-card{background:var(--card);border-radius:var(--r-lg);padding:13px;text-align:center;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.ssc-ico{font-size:22px;margin-bottom:4px}
.ssc-val{font-size:22px;font-weight:900}
.ssc-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* ===================== YoY COMPARISON ===================== */
.yoy-chart-wrap{background:var(--card);border-radius:var(--r-xl);margin:0 12px 14px;padding:16px;box-shadow:var(--sh-sm);border:1px solid var(--border)}
.yoy-legend{display:flex;gap:16px;margin-bottom:12px;font-size:12px;font-weight:700}

/* ===================== FORECAST ===================== */
.forecast-card{background:linear-gradient(135deg,var(--p-lt),#e0e7ff);border-radius:var(--r-xl);margin:0 12px 14px;padding:16px 18px;border:1px solid var(--p-md)}
.fc-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--p);margin-bottom:4px}
.fc-val{font-size:26px;font-weight:900;color:var(--t1)}
.fc-note{font-size:11px;color:var(--t2);margin-top:5px;line-height:1.5}

/* ===================== TAX REPORT ===================== */
.tax-card{background:var(--card);border-radius:var(--r-xl);margin:0 12px 14px;padding:16px 18px;box-shadow:var(--sh-sm);border:1px solid var(--border)}


/* ===================== LOCK SCREEN ===================== */
.lock-screen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,#0f0c1e,#1a1035,#0d1929);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;font-family:'Plus Jakarta Sans',-apple-system,sans-serif
}
.lock-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 30% 20%,rgba(212,0,107,.12) 0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 70% 80%,rgba(91,91,214,.1) 0%,transparent 60%);
  pointer-events:none
}
.lock-logo{text-align:center;margin-bottom:32px;position:relative;z-index:1}
.lock-logo-txt{
  font-family:'Bebas Neue','Impact',sans-serif;
  font-size:42px;font-weight:900;letter-spacing:4px;
  color:#fff;font-style:italic;line-height:1
}
.lock-logo-txt span{color:#d4006b}
.lock-logo-sub{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-top:3px;text-transform:uppercase}
.lock-card{
  width:100%;max-width:360px;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-radius:28px;padding:28px 24px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15);
  position:relative;z-index:1
}
.lock-title{font-size:16px;font-weight:800;color:rgba(255,255,255,.9);text-align:center;margin-bottom:18px}
.user-tabs{display:flex;gap:6px;background:rgba(0,0,0,.3);border-radius:var(--r-full);padding:4px;margin-bottom:18px}
.user-tab{
  flex:1;padding:9px;border:none;border-radius:var(--r-full);
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  background:transparent;color:rgba(255,255,255,.4);transition:all .2s
}
.user-tab.active{background:#d4006b;color:#fff;box-shadow:0 4px 14px rgba(212,0,107,.4)}
.lock-input-wrap{position:relative;margin-bottom:14px}
.lock-input{
  width:100%;padding:14px 48px 14px 16px;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  border-radius:var(--r-full);font-size:15px;font-weight:700;letter-spacing:.5px;
  color:#fff;font-family:inherit;outline:none;transition:border-color .2s
}
.lock-input:focus{border-color:#d4006b;background:rgba(212,0,107,.08)}
.lock-input::placeholder{color:rgba(255,255,255,.3);font-weight:400;letter-spacing:0}
.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;
  font-size:18px;padding:4px;transition:color .2s
}
.eye-btn:hover{color:#fff}
.lock-btn{
  width:100%;padding:14px;border:none;border-radius:var(--r-full);
  background:linear-gradient(135deg,#d4006b,#9c004f);color:#fff;
  font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 20px rgba(212,0,107,.4);transition:all .2s;letter-spacing:.3px
}
.lock-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(212,0,107,.5)}
.lock-btn:active{transform:scale(.97)}
.lock-error{
  color:#fca5a5;font-size:12px;font-weight:700;text-align:center;
  margin-top:10px;padding:8px;background:rgba(220,38,38,.15);
  border-radius:var(--r-md);border:1px solid rgba(220,38,38,.3);
  display:none
}
.lock-error.show{display:block;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-time{color:rgba(255,255,255,.35);font-size:11px;text-align:center;margin-top:14px}
.lock-timeout-msg{
  background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);
  color:#fbbf24;padding:8px 14px;border-radius:var(--r-md);
  font-size:12px;font-weight:700;text-align:center;margin-bottom:14px;display:none
}
/* User management in settings */
.user-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--card);border-radius:var(--r-lg);margin-bottom:8px;
  box-shadow:var(--sh-sm);border:1px solid var(--border)
}
.user-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#d4006b,#9c004f);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#fff;flex-shrink:0
}
.user-info{flex:1}
.user-name{font-size:14px;font-weight:800;color:var(--t1)}
.user-role{font-size:11px;color:var(--t2);font-weight:600}


/* ===================== DOCUMENT STATUS ===================== */
.doc-status{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:var(--r-full);
  font-size:10px;font-weight:800;letter-spacing:.3px;
  cursor:pointer;transition:all .15s;border:none;font-family:inherit
}
.ds-draf     { background:#f3f4f6;color:#6b7280 }
.ds-dihantar { background:#dbeafe;color:#1d4ed8 }
.ds-selesai  { background:#dcfce7;color:#16a34a }
.ds-tertunggak{ background:#fef3c7;color:#d97706 }
.ds-dibatalkan{ background:#fee2e2;color:#dc2626 }
.status-filter-row{
  display:flex;gap:6px;padding:0 12px 10px;
  overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch
}
.sf-btn{
  display:flex;align-items:center;gap:5px;padding:6px 12px;
  border-radius:var(--r-full);border:1.5px solid var(--border);
  background:#fff;font-size:11px;font-weight:700;cursor:pointer;
  color:var(--t2);font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0
}
.sf-btn.on{ border-color:var(--p);background:var(--p-lt);color:var(--p) }
.sf-count{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:50%;
  font-size:9px;font-weight:900;background:var(--p);color:#fff
}
.dok-list-item-v2{
  display:flex;align-items:stretch;
  background:var(--card);border-radius:var(--r-xl);margin-bottom:10px;
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  cursor:pointer;transition:all .2s;overflow:hidden
}
.dok-list-item-v2:hover{box-shadow:var(--sh-md);border-color:var(--p-md)}
.dli-status-bar{ width:5px;flex-shrink:0 }
.dli-body{ flex:1;padding:14px 14px 12px;min-width:0 }
.dli-row1{ display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap }
.dli-actions{ display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding:12px 12px 12px 6px;flex-shrink:0 }
/* Summary pills row */
.doc-summary-row{
  display:flex;gap:8px;padding:0 12px 10px;overflow-x:auto;flex-wrap:nowrap
}
.doc-sum-pill{
  flex-shrink:0;background:var(--card);border-radius:var(--r-lg);
  padding:10px 14px;border:1px solid var(--border);box-shadow:var(--sh-sm);text-align:center
}
.dsp-val{font-size:18px;font-weight:900}
.dsp-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}




/* ===== SLIP GAJI PRINT BUTTON ===== */
.gaji-btn-slip { background:#fff3e0; color:#d97706; }
.gaji-btn-slip:hover { background:#d97706; color:#fff; transform:scale(1.1); }


/* ===== STAFF MODULE ===== */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:14px 14px 80px}
.staff-card{
  background:var(--card);border-radius:var(--r-xl);
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer
}
.staff-card:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.sc-photo-wrap{
  position:relative;height:90px;
  background:linear-gradient(135deg,var(--p-lt),#ede9fe);
  display:flex;align-items:flex-end;justify-content:center;
}
.sc-photo{
  width:72px;height:72px;border-radius:50%;
  border:3px solid var(--card);object-fit:cover;
  background:#e9e9ef;display:flex;align-items:center;justify-content:center;
  font-size:28px;overflow:hidden;margin-bottom:-20px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,0,0,.12)
}
.sc-body{padding:28px 16px 16px;text-align:center}
.sc-empid{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--p);background:var(--p-lt);padding:2px 9px;border-radius:var(--r-full);display:inline-block;margin-bottom:6px}
.sc-name{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:3px;letter-spacing:-.2px}
.sc-pos{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px}
.sc-info-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;text-align:left}
.sc-info-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2)}
.sc-info-item span{font-weight:600;color:var(--t1)}
.sc-socials{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.sc-social-btn{
  padding:4px 10px;border-radius:var(--r-full);
  font-size:11px;font-weight:700;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;
  transition:all .15s;border:1px solid var(--border)
}
.sc-social-btn:hover{opacity:.8;transform:scale(1.05)}
.sc-fb{background:#f0f4ff;color:#1877f2}
.sc-ig{background:#fff0f8;color:#e1306c}
.sc-tt{background:#f0fafb;color:#000}
.sc-actions{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--border);background:#fafafa}

/* Staff form */
.staff-form-photo{
  width:90px;height:90px;border-radius:50%;
  background:#f0f0f5;border:2px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;margin:0 auto 12px;
  font-size:24px;color:var(--t3);transition:all .18s
}
.staff-form-photo:hover{border-color:var(--p);background:var(--p-lt)}
.staff-form-photo img{width:100%;height:100%;object-fit:cover}


/* ===== CENTERED MODAL OVERLAY (for Gaji / Staff / Syer forms) ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  z-index:9999;padding:16px;
}
.modal-overlay.show{display:flex;animation:fadeInScale .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes fadeInScale{
  from{opacity:0;transform:scale(.94)}
  to{opacity:1;transform:scale(1)}
}
.modal-overlay .modal-box{
  border-radius:20px !important;
  box-shadow:0 20px 60px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.15);
  background:#fff;
  animation:none !important;
  transform:none !important;
  max-height:90vh;overflow-y:auto;
}



/* ===== ROLE-BASED ACCESS ===== */
.tab-admin-only { display: none; }   /* hidden until admin confirmed */
.role-staff-ui .tab-admin-only { display: none !important; }

/* ===== PS OVERLAY TAB ===== */
.ov-wrap{ background:#0d1117; border-radius:var(--r-lg); overflow:hidden; padding:0; }
.ov-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.ov-title{ font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:#fff; font-style:italic }
.ov-title span{ color:#d4006b }
.ov-badges{ display:flex; gap:10px; align-items:center }
.ov-badge{ display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-full);padding:5px 12px }
.ov-badge-dot{ width:8px;height:8px;border-radius:50% }
.ov-badge-txt{ font-size:11px;font-weight:800;color:#fff;letter-spacing:.5px }
.ov-live-dot{ width:8px;height:8px;border-radius:50%;background:#ff3b30;animation:ovBlink .8s infinite }
@keyframes ovBlink{0%,100%{opacity:1}50%{opacity:.15}}
.ov-clock{ font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;letter-spacing:2px }

/* Station grid */
.ov-grid{
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:0; border-bottom:1px solid rgba(255,255,255,.06);
}
@media(max-width:600px){ .ov-grid{ grid-template-columns:repeat(2,1fr) } }
.ov-station{
  padding:18px 10px 16px;
  text-align:center; position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid rgba(255,255,255,.06);
  border-bottom:1px solid rgba(255,255,255,.06);
  transition:background .3s; cursor:default;
}
.ov-station:nth-child(5n){ border-right:none }
@media(max-width:600px){
  .ov-station:nth-child(2n){ border-right:none }
  .ov-station:nth-child(5n){ border-right:1px solid rgba(255,255,255,.06) }
}
.ov-station::before{ content:'';position:absolute;top:0;left:0;right:0;height:35%;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);pointer-events:none }
.ov-station.ov-free{ background:linear-gradient(180deg,#1e8c3a,#158030) }
.ov-station.ov-used{ background:linear-gradient(180deg,#c0392b,#a93226) }
.ov-station.ov-warn{ background:linear-gradient(180deg,#e67e22,#d35400);animation:ovWarnPulse .8s infinite alternate }
@keyframes ovWarnPulse{from{filter:brightness(1)}to{filter:brightness(1.2)}}
.ov-s-num{ font-size:10px;font-weight:800;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px }
.ov-s-type{ font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:#fff;line-height:1;text-shadow:0 2px 6px rgba(0,0,0,.4) }
.ov-s-timer{ font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;letter-spacing:1.5px;margin-top:4px;line-height:1 }
.ov-s-timer.ov-ready{ font-size:13px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:4px;margin-top:6px;letter-spacing:2px }
.ov-s-info{ font-size:10px;font-weight:700;color:rgba(255,255,255,.7);margin-top:3px }

/* Ticker */
.ov-ticker{
  background:linear-gradient(90deg,#d4006b,#9c004f);
  height:34px; overflow:hidden; display:flex; align-items:center;
}
.ov-ticker-track{ display:flex;white-space:nowrap;animation:ovScroll 28s linear infinite }
.ov-ticker-txt{ font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;padding:0 50px }
.ov-ticker-sep{ font-size:16px;color:rgba(255,255,255,.5);padding:0 16px }
@keyframes ovScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Footer stats */
.ov-footer{
  display:grid; grid-template-columns:repeat(4,1fr);
  padding:14px 18px; gap:12px;
  background:linear-gradient(135deg,#161b22,#0d1117);
}
.ov-stat{ text-align:center }
.ov-stat-val{ font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px }
.ov-stat-lbl{ font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px }

/* ===== GAJI TAB REVAMP ===== */
.gaji-header { display:flex; justify-content:space-between; align-items:center; padding:14px 14px 10px; flex-wrap:wrap; gap:10px }
.gaji-title  { font-size:18px; font-weight:900; letter-spacing:-.3px }

/* Type filter pills */
.gaji-type-tabs { display:flex; gap:6px; padding:0 14px 10px }
.gtt { padding:7px 16px; border-radius:var(--r-full); border:1.5px solid var(--border); background:var(--card); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--t2); transition:all .15s }
.gtt:hover { border-color:var(--p); color:var(--p) }
.gtt.on { background:var(--p); border-color:var(--p); color:#fff }
.gtt.on-green { background:var(--green); border-color:var(--green); color:#fff }
.gtt.on-pu { background:#7c3aed; border-color:#7c3aed; color:#fff }

/* Filter row */
.gaji-filter { display:grid; grid-template-columns:1fr auto auto auto; gap:8px; padding:0 14px 12px; align-items:end }
@media(max-width:600px){ .gaji-filter { grid-template-columns:1fr 1fr; } }

/* Summary strip */
.gaji-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--card); margin-bottom:10px }
.gss { padding:12px 14px; text-align:center; border-right:1px solid var(--border) }
.gss:last-child { border-right:none }
.gss-v { font-size:15px; font-weight:900; letter-spacing:-.3px }
.gss-l { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--t3); margin-top:2px }
@media(max-width:480px){ .gaji-summary { grid-template-columns:1fr 1fr } .gss:nth-child(2n){ border-right:none } .gss:nth-child(n+3){ border-top:1px solid var(--border) } }

/* Month filter */
.gaji-month-row { display:flex; gap:6px; padding:0 14px 8px; overflow-x:auto; -ms-overflow-style:none; scrollbar-width:none }
.gaji-month-row::-webkit-scrollbar { display:none }
.gm-pill { padding:5px 12px; border-radius:var(--r-full); border:1px solid var(--border); background:var(--card); font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--t2); white-space:nowrap; transition:all .15s; flex-shrink:0 }
.gm-pill:hover { border-color:var(--p); color:var(--p) }
.gm-pill.on { background:var(--p-lt); border-color:var(--p); color:var(--p) }

/* Table */
.gaji-tbl-wrap { overflow-x:auto; padding:0 14px }
.gaji-tbl { width:100%; border-collapse:collapse; font-size:13px }
.gaji-tbl th { background:#f9fafb; padding:10px 12px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--t2); border-bottom:2px solid var(--border); white-space:nowrap }
.gaji-tbl td { padding:10px 12px; border-bottom:1px solid #f5f5f5; vertical-align:middle }
.gaji-tbl tr:last-child td { border-bottom:none }
.gaji-tbl tr:hover td { background:#fafbff }
.gaji-tbl .num { text-align:right; font-family:'Courier New',monospace; font-weight:700 }

/* Gaji-specific action buttons (NO conflict with record tab) */
.gaji-btn { width:30px; height:30px; border-radius:8px; border:none; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; transition:all .15s; flex-shrink:0 }
.gaji-btn-edit { background:#dbeafe; color:#1d4ed8 }
.gaji-btn-edit:hover { background:#1d4ed8; color:#fff; transform:scale(1.1) }
.gaji-btn-del  { background:#fee2e2; color:#dc2626 }
.gaji-btn-del:hover  { background:#dc2626; color:#fff; transform:scale(1.1) }

/* Badge jenis */
.badge-staff { background:#dbeafe; color:#1d4ed8; padding:3px 9px; border-radius:var(--r-full); font-size:10px; font-weight:800; white-space:nowrap }
.badge-pt    { background:#f3e8ff; color:#7c3aed; padding:3px 9px; border-radius:var(--r-full); font-size:10px; font-weight:800; white-space:nowrap }

/* Empty state */
.gaji-empty { text-align:center; padding:48px 20px }
.gaji-empty-ico { font-size:48px; margin-bottom:12px }
.gaji-empty-txt { font-size:14px; font-weight:700; color:var(--t2) }

/* Footer action row */
.gaji-footer { display:flex; gap:8px; padding:10px 14px 14px; justify-content:space-between; align-items:center; flex-wrap:wrap }

/* ===== GAJI & SYER MODULE (old) ===== */
.gaji-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.gs-item{background:var(--card);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--sh-sm);border:1px solid var(--border);text-align:center}
.gs-val{font-size:17px;font-weight:900;color:var(--t1);margin-bottom:2px}
.gs-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}

/* ===== NAV VISIBILITY ===== */
.mob-only { display: flex !important; }
#glassNav { display:flex; }

  height: 1px; background: var(--border);

/* ===== PS BOOKING MODULE ===== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.bk-wrap :root
{
  --blue:#007aff;--blue-lt:rgba(0,122,255,.12);--blue-dk:#0051d5;
  --green:#34c759;--green-lt:rgba(52,199,89,.12);
  --red:#ff3b30;--red-lt:rgba(255,59,48,.1);
  --amber:#ff9500;--amber-lt:rgba(255,149,0,.12);
  --purple:#af52de;--purple-lt:rgba(175,82,222,.12);
  --t1:#1c1c1e;--t2:#636366;--t3:#aeaeb2;--border:rgba(0,0,0,.08);
  --r:16px;--r-sm:12px;--r-lg:24px;--r-xl:32px;--r-full:999px;
  /* Glass */
  --glass:rgba(255,255,255,.72);
  --glass-border:rgba(255,255,255,.5);
  --glass-dark:rgba(28,28,30,.75);
  --blur:blur(20px);
  --blur-sm:blur(12px);
  --sh:0 2px 8px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.04);
  --sh-md:0 8px 24px rgba(0,0,0,.1),0 0 0 .5px rgba(0,0,0,.04);
  --sh-lg:0 20px 48px rgba(0,0,0,.14),0 0 0 .5px rgba(0,0,0,.04);
  --sh-glass:0 8px 32px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.6);
}
.bk-wrap {
  background:#e8eaf6;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(120,180,255,.22) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%,rgba(175,82,222,.14) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(255,255,255,.3) 0%,transparent 100%);
  background-attachment:fixed;
  font-family:'Inter',-apple-system,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
  color:var(--t1);font-size:14px;min-height:100vh;letter-spacing:-.01em;
}

/* HEADER GLASS */
.bk-wrap .hdr
{
  background:rgba(255,255,255,.78);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid rgba(255,255,255,.6);
  padding:0 20px;display:flex;align-items:center;gap:0;
  height:54px;position:sticky;top:0;z-index:200;
  box-shadow:0 1px 0 rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
.bk-wrap .hb
{display:flex;align-items:center;gap:9px;margin-right:20px;flex-shrink:0}
.bk-wrap .hb .ico
{width:32px;height:32px;background:linear-gradient(145deg,#1c1c2e,#2d2d44);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.bk-wrap .hb .nm
{font-size:14px;font-weight:800;letter-spacing:-.4px}
.bk-wrap .hb .vr
{font-size:10px;color:var(--t3);font-weight:600;background:rgba(0,0,0,.06);padding:2px 7px;border-radius:var(--r-full);margin-left:2px}
.bk-wrap .hnav
{display:flex;gap:2px;flex:1;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.bk-wrap .hnav::-webkit-scrollbar
{display:none}
.bk-wrap .ht
{padding:6px 14px;border-radius:var(--r-full);border:none;background:transparent;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.bk-wrap .ht:hover
{background:rgba(0,0,0,.05);color:var(--t1)}
.bk-wrap .ht.on
{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.35)}
.bk-wrap .hst
{display:flex;gap:6px;align-items:center;flex-shrink:0}
.bk-wrap .hsp
{background:rgba(0,0,0,.05);backdrop-filter:var(--blur-sm);border-radius:var(--r-full);padding:5px 12px;font-size:12px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid rgba(255,255,255,.5)}
.bk-wrap .hdot
{width:7px;height:7px;border-radius:50%}
.bk-wrap .hclk
{font-size:12px;font-weight:800;color:var(--blue);font-family:'SF Mono','Courier New',monospace;letter-spacing:.5px;min-width:72px;text-align:right}

/* BODY */
.bk-wrap .body
{max-width:1440px;margin:0 auto;padding:20px 20px 48px}

/* GLASS CARD */
.bk-wrap .card
{
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-radius:var(--r-xl);
  box-shadow:var(--sh-glass);
  border:1px solid var(--glass-border);
  overflow:hidden;margin-bottom:16px
}
.bk-wrap .ch
{padding:18px 22px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.bk-wrap .ct
{font-size:18px;font-weight:800;letter-spacing:-.4px}

/* SUMMARY STRIP */
.bk-wrap .strip
{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid rgba(0,0,0,.06)}
.bk-wrap .si
{padding:14px 16px;text-align:center;border-right:1px solid rgba(0,0,0,.06)}
.bk-wrap .si:last-child
{border-right:none}
.bk-wrap .sv
{font-size:20px;font-weight:900;letter-spacing:-.5px}
.bk-wrap .sl
{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}

/* STATION GRID */
.bk-wrap .sgrid
{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px 22px 20px}
@media(max-width:1100px){.sgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){.sgrid{grid-template-columns:repeat(2,1fr)}}
.bk-wrap .sc
{
  background:rgba(255,255,255,.6);
  backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
  border:1px solid rgba(255,255,255,.7);

<script>
// ================================================================
//  STORAGE
// ================================================================
const SK_TX   = 'mde_tx_v3';
const SK_CATS = 'mde_cats_v3';
const SK_NOTES= 'mde_notes_v3';

let tx = [], notes = {};
let cats = {
  income:  ['🏪 Sewaan Station','🏆 Tournament Prize','🎮 Game Sales','📺 Sponsorship','👕 Merchandise','💻 Coaching','📱 Streaming'],
  expense: ['⚡ Utiliti','💰 Gaji','🏢 Sewa','🌐 Internet','📱 Marketing','🖥️ Hardware','🍔 Makanan','🚗 Transport']
};

function loadData() {
  try {
    const t = localStorage.getItem(SK_TX);   if (t) tx    = JSON.parse(t);
    const c = localStorage.getItem(SK_CATS); if (c) cats  = JSON.parse(c);
    const n = localStorage.getItem(SK_NOTES);if (n) notes = JSON.parse(n);
  } catch(e) {}
}
function saveAll() {
  localStorage.setItem(SK_TX,    JSON.stringify(tx));
  localStorage.setItem(SK_CATS,  JSON.stringify(cats));
  localStorage.setItem(SK_NOTES, JSON.stringify(notes));
}

// ================================================================
//  DUMMY DATA  — Dec 2025 ~ May 2026
// ================================================================
const DEC_INC = [47,96,45,74,104,643,359,122,50,77,83,60,396,439,187,123,105,145,55,433,263,254,239,109,132,147,204,247,212,105,265];
const JAN_INC = {1:1972.51,2:70,3:355,4:334,5:148,6:147,7:142,8:305,9:212.5,10:357,11:314,12:73,13:50,14:307,15:85,16:170,17:360,18:347,19:107,20:45,21:115,22:50,23:443.78,24:318.6,25:1143.41,26:32,27:28,28:10,29:122,30:32,31:1479.8};
const FEB_INC = [305,85,40,100,105,332,387,590,180,75,25,125,462,315,427,287,100,137,132,322,202,299,55,90,949,150,445];
const DEC_EXP = [[31,'⚡ Utiliti',140,'Bil Utiliti']];
const JAN_EXP = [[1,'🏢 Sewa',177.51,'Sewa Lot Kedai'],[8,'⚡ Utiliti',24,'Bil Elektrik']];
const FEB_EXP = [[5,'🏢 Sewa',177.51,'Sewa Lot Kedai']];

function generateDummyData() {
  if (tx.length > 0) return;
  const push = (date, type, amount, cat, desc) =>
    tx.push({ id: Date.now() + Math.random(), date, type, amount, category: cat, desc });

  // Dec 2025
  DEC_INC.forEach((a,i) => push(`2025-12-${String(i+1).padStart(2,'0')}`, 'income', a, '🏪 Sewaan Station', 'Pendapatan Harian'));
  DEC_EXP.forEach(([d,c,a,ds]) => push(`2025-12-${String(d).padStart(2,'0')}`, 'expense', a, c, ds));

  // Jan 2026
  for (let d = 1; d <= 31; d++) {
    const a = JAN_INC[d] ?? (Math.floor(Math.random()*120)+80);
    push(`2026-01-${String(d).padStart(2,'0')}`, 'income', a, '🏪 Sewaan Station', 'Pendapatan Harian');
  }
  JAN_EXP.forEach(([d,c,a,ds]) => push(`2026-01-${String(d).padStart(2,'0')}`, 'expense', a, c, ds));

  // Feb 2026
  FEB_INC.forEach((a,i) => push(`2026-02-${String(i+1).padStart(2,'0')}`, 'income', a, '🏪 Sewaan Station', 'Pendapatan Harian'));
  FEB_EXP.forEach(([d,c,a,ds]) => push(`2026-02-${String(d).padStart(2,'0')}`, 'expense', a, c, ds));

  // Mar 2026
  for (let i=1;i<=31;i++) push(`2026-03-${String(i).padStart(2,'0')}`, 'income', 800+Math.floor(Math.random()*500), '🏪 Sewaan Station', 'Pendapatan Harian');
  push('2026-03-01','expense',177.51,'🏢 Sewa','Sewa Lot Kedai');

  // Apr 2026
  for (let i=1;i<=30;i++) push(`2026-04-${String(i).padStart(2,'0')}`, 'income', 900+Math.floor(Math.random()*600), '🏪 Sewaan Station', 'Pendapatan Harian');
  push('2026-04-01','expense',177.51,'🏢 Sewa','Sewa Lot Kedai');

  // May 2026 (up to day 29)
  for (let i=1;i<=29;i++) push(`2026-05-${String(i).padStart(2,'0')}`, 'income', 1000+Math.floor(Math.random()*700), '🏪 Sewaan Station', 'Pendapatan Harian');
  push('2026-05-01','expense',177.51,'🏢 Sewa','Sewa Lot Kedai');
  push('2026-05-10','expense',250,'💰 Gaji','Gaji Pekerja');

  saveAll();
}

// ================================================================
//  HELPERS
// ================================================================
const $ = id => document.getElementById(id);
const fmtAmt = n => {
  if (n === 0) return 'RM0';
  const hasDecimal = (n % 1) !== 0;
  const str = hasDecimal ? n.toFixed(2) : Math.round(n).toString();
  const parts = str.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return 'RM' + parts.join('.');
};
const fmt = fmtAmt;
const fmtFull = n => 'RM ' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

function getTotal(type) { return tx.filter(t=>t.type===type).reduce((s,t)=>s+t.amount,0); }
function getMonthTotal(type,y,m) { return tx.filter(t=>{const d=new Date(t.date);return t.type===type&&d.getFullYear()===y&&d.getMonth()===m}).reduce((s,t)=>s+t.amount,0); }
function getDayTotal(date,type) { return tx.filter(t=>t.date===date&&t.type===type).reduce((s,t)=>s+t.amount,0); }
function getByDate(date) { return tx.filter(t=>t.date===date); }
function getNote(date) { return notes[date]||''; }
function setNote(date,v) { if(!v.trim()) delete notes[date]; else notes[date]=v.trim(); saveAll(); }

function sparkSVG(vals, w=120, h=28) {
  if (!vals.length) return '';
  const mx = Math.max(...vals,1), step = w/(vals.length-1||1);
  const pts = vals.map((v,i)=>`${i*step},${h-(v/mx)*h}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;display:block"><polyline points="${pts}" fill="none" stroke="#5b5bd6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// ================================================================
//  CRUD
// ================================================================
function addTx(date,type,amount,category,desc) {
  tx.push({id:Date.now()+Math.random(),date,type,amount,category,desc});
  saveAll(); render();
}
function updateTx(id,data) {
  const i = tx.findIndex(t=>t.id===id);
  if(i!==-1){tx[i]={...tx[i],...data};saveAll();render();}
}
window.deleteTx = function(id) {
  tx = tx.filter(t=>t.id!==id); saveAll(); render();
  if($('txModal').style.display==='flex') renderTxList();
};
function deleteTxMany(ids) { tx=tx.filter(t=>!ids.includes(t.id)); saveAll(); render(); }
function bulkCat(ids,cat) { ids.forEach(id=>{const i=tx.findIndex(t=>t.id===id);if(i!==-1)tx[i].category=cat;}); saveAll(); render(); }
function addCat(type,name) {
  if(!name.trim()||cats[type].includes(name.trim())) return false;
  cats[type].push(name.trim()); saveAll(); return true;
}
window.deleteCat = function(type,name) { cats[type]=cats[type].filter(c=>c!==name); saveAll(); renderCatList(); updateCatSel(); };

// ================================================================
//  NUMPAD LOGIC
// ================================================================
let numpadVal = '';
let numpadCallback = null;

function openNumpad(currentVal, title, catName, type, dateStr) {
  numpadVal = currentVal ? String(currentVal) : '';
  $('numpadModal').style.display = 'flex';
  $('numpadTitle').textContent = catName || title;
  $('npTagTypeText').textContent = type === 'income' ? 'Income' : 'Expense';
  $('npTagDateText').textContent = dateStr || 'Tarikh';
  $('npCatName').textContent = catName || 'Kategori';
  $('npTagType').className = 'numpad-tag active';
  updateNumpadDisplay();
}

function updateNumpadDisplay() {
  const el = $('numpadDisplay');
  if (!numpadVal || numpadVal === '0') {
    el.textContent = 'RM0';
    el.className = 'numpad-amount zero';
  } else {
    el.textContent = 'RM' + numpadVal;
    el.className = 'numpad-amount has-val';
  }
}

function handleNumpadKey(k) {
  if (k === 'back') {
    numpadVal = numpadVal.slice(0, -1);
  } else if (k === 'ok') {
    const v = parseFloat(numpadVal);
    if (!isNaN(v) && v > 0) {
      $('txAmount').value = numpadVal;
      const btn = $('amountBtn');
      $('amountDisplay').textContent = 'RM ' + parseFloat(numpadVal).toFixed(2);
      btn.classList.add('filled');
    }
    $('numpadModal').style.display = 'none';
    return;
  } else if (k === 'rm' || k === '+' || k === '-') {
    return;
  } else if (k === '.') {
    if (!numpadVal.includes('.')) numpadVal += '.';
  } else {
    if (numpadVal === '0') numpadVal = k;
    else if (numpadVal.length < 10) numpadVal += k;
  }
  updateNumpadDisplay();
}

// Attach numpad keys
document.querySelectorAll('.numpad-key').forEach(btn => {
  btn.addEventListener('click', () => handleNumpadKey(btn.dataset.k));
});
$('numpadClose').onclick = () => { $('numpadModal').style.display = 'none'; };

let curDate='', editId=null, currentTxType='income';

function setTxType(type) {
  currentTxType = type;
  $('txType').value = type;
  const btn = $('typeSelectorBtn');
  if (type === 'income') {
    $('typeIcon').textContent = '📈';
    $('typeLabelText').textContent = 'Income';
    btn.className = 'type-sel-btn income-active';
  } else {
    $('typeIcon').textContent = '📉';
    $('typeLabelText').textContent = 'Expense';
    btn.className = 'type-sel-btn expense-active';
  }
  updateCatSel();
}

function openModal(date, id=null) {
  curDate=date; editId=id;
  $('mDateTitle').textContent = date;
  $('txModal').style.display = 'flex';
  $('mTxPanel').style.display = 'block';
  $('mNotePanel').style.display = 'none';
  $('mTabTx').classList.add('on'); $('mTabNote').classList.remove('on');
  // reset
  $('txAmount').value = '';
  $('amountDisplay').textContent = 'Jumlah (RM)';
  $('amountBtn').classList.remove('filled');
  $('txDesc').value = '';
  setTxType('income');
  renderTxList(); renderNoteDisplay();
  if (editId) {
    const t = tx.find(t=>t.id===editId);
    if (t) {
      setTxType(t.type);
      setTimeout(()=>{ $('txCategory').value = t.category; }, 40);
      $('txAmount').value = t.amount;
      $('amountDisplay').textContent = 'RM ' + parseFloat(t.amount).toFixed(2);
      $('amountBtn').classList.add('filled');
      $('txDesc').value = t.desc;
      $('saveTxBtn').textContent = 'Kemaskini';
    }
  } else { $('saveTxBtn').textContent = 'Simpan'; }
}
function closeModal() { $('txModal').style.display='none'; editId=null; }
function updateCatSel() {
  const type = $('txType').value || currentTxType;
  const sel = $('txCategory');
  sel.innerHTML = cats[type].length
    ? cats[type].map(c=>`<option value="${c}">${c}</option>`).join('')
    : '<option value="">Tiada kategori</option>';
}
function renderTxList() {
  const list=getByDate(curDate);
  $('txList').innerHTML = list.length
    ? list.map(t=>{
        const isInc = t.type==='income';
        const ico = isInc ? '📈' : '📉';
        const bg = isInc ? '#dcfce7' : '#fee2e2';
        return `<div class="tx-item-v2">
          <div class="tx-ico-wrap" style="background:${bg}">${ico}</div>
          <div class="tx-content">
            <div class="tx-desc-v2">${t.desc||t.category}</div>
            <div class="tx-sub-v2">${t.category} · <span class="tx-amt ${isInc?'income':'expense'}">${isInc?'+':'-'}${fmtFull(t.amount)}</span></div>
          </div>
          <div class="tx-acts">
            <button class="tx-act-btn tx-act-edit" onclick="editEntry(${t.id})">✏️</button>
            <button class="tx-act-btn tx-act-del" onclick="deleteTx(${t.id})">🗑️</button>
          </div>
        </div>`;
      }).join('')
    : '<div class="empty-txt" style="padding:16px 0">Tiada transaksi</div>';
}
function renderNoteDisplay() {
  const note=getNote(curDate);
  $('noteContent').value=note;
  $('noteDisplay').innerHTML = note
    ? `<div class="tx-item-v2"><div class="tx-content"><div class="tx-sub-v2" style="font-size:13px">📝 ${note}</div></div><button class="tx-act-btn tx-act-del" onclick="delNote()">🗑️</button></div>`
    : '<div class="empty-txt" style="padding:16px 0">Tiada nota</div>';
}
function saveNote() { setNote(curDate,$('noteContent').value); renderNoteDisplay(); render(); }
function delNote() { setNote(curDate,''); renderNoteDisplay(); render(); }
function saveTransaction() {
  const type = $('txType').value || currentTxType;
  const amt = parseFloat($('txAmount').value);
  if(isNaN(amt)||amt<=0){ alert('Masukkan jumlah yang sah — klik butang jumlah'); return; }
  const cat = $('txCategory').value;
  if(!cat){ alert('Pilih kategori'); return; }
  const desc = $('txDesc').value.trim() || (type==='income'?'Pendapatan':'Perbelanjaan');
  if(editId) updateTx(editId,{type,amount:amt,category:cat,desc,date:curDate});
  else addTx(curDate,type,amt,cat,desc);
  closeModal();
}
window.editEntry = function(id){ const t=tx.find(t=>t.id===id); if(t) openModal(t.date,id); };

function renderCatList() {

  $('catList').innerHTML = list.length
    ? list.map(c=>`<div class="cat-list-item"><span style="font-size:14px;font-weight:600">${c}</span><button class="btn btn-del sm" onclick="deleteCat('${type}','${c.replace(/'/g,"\\'")}')">Padam</button></div>`).join('')
    : '<div class="empty-txt">Tiada kategori</div>';

let curY = new Date().getFullYear();
let curM = new Date().getMonth(); // 0=Jan ... 5=Jun ... 11=Dis

// ================================================================
//  RENDER CALENDAR
// ================================================================
function renderCalendar() {
  const MN = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
  const MS = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
  const dim = new Date(curY,curM+1,0).getDate();
  let start = new Date(curY,curM,1).getDay();
  start = start===0?6:start-1;

  const days=[];
  for(let i=0;i<start;i++) days.push(null);
  for(let d=1;d<=dim;d++) days.push(d);
  while(days.length<42) days.push(null);

  const today=new Date(), isThisM=(today.getFullYear()===curY&&today.getMonth()===curM);
  const todD=today.getDate();

  // Heatmap: compute max income this month for colour scaling
  const allDayIncs = [];
  for(let d=1;d<=dim;d++){
    const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    allDayIncs.push(getDayTotal(ds,'income'));
  }
  const maxDayInc = Math.max(...allDayIncs, 1);

  const daysHtml = days.map(day=>{
    if(!day) return `<div class="cal-day cal-empty"><div class="cal-num"></div></div>`;
    const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const inc=getDayTotal(ds,'income'), exp=getDayTotal(ds,'expense');
    const hasNote=getNote(ds)!=='', isToday=isThisM&&day===todD;
    const iTxt=inc>0?fmtAmt(inc):'', eTxt=exp>0?fmtAmt(exp):'';
    // Heatmap colour level (skip today — already amber)
    let hmClass = 'hm-0';
    if(!isToday){
      if(inc===0 && exp>0) hmClass='hm-exp';
      else if(inc>0){ const lvl=Math.min(7,Math.ceil((inc/maxDayInc)*7)); hmClass='hm-'+lvl; }
    }
    return `<div class="cal-day ${isToday?'cal-today':hmClass}" onclick="openModal('${ds}')">
      <div class="cal-num">${day}</div>
      ${iTxt?`<div class="cal-inc">${iTxt}</div>`:''}
      ${eTxt?`<div class="cal-exp">${eTxt}</div>`:''}
      ${hasNote?`<div class="cal-dot"></div>`:''}
      ${!inc&&!exp?`<button class="cal-plus" onclick="event.stopPropagation();copyPrev(${day},${curY},${curM})">+</button>`:''}
    </div>`;
  }).join('');

  const totInc=getMonthTotal('income',curY,curM);
  const totExp=getMonthTotal('expense',curY,curM);
  const bal=totInc-totExp;

  // Weekly analysis
  const weeks=[];
  let ws=1;
  while(ws<=dim){
    const we=Math.min(ws+6,dim);
    const vals=[];
    let tot=0, best={day:ws,amt:0};
    for(let d=ws;d<=we;d++){
      const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const a=getDayTotal(ds,'income'); vals.push(a); tot+=a;
      if(a>best.amt) best={day:d,amt:a};
    }
    weeks.push({wk:Math.floor((ws-1)/7)+1,start:ws,end:we,total:tot,avg:tot/(we-ws+1),best,vals});
    ws=we+1;
  }
  const maxW=weeks.reduce((a,b)=>b.total>a.total?b:a,{total:0});
  const minW=weeks.reduce((a,b)=>b.total<a.total?b:a,{total:Infinity});
  const avgW=totInc/weeks.length;

  let monthSel='', yearSel='';
  MS.forEach((m,i)=>monthSel+=`<option value="${i}"${i===curM?' selected':''}>${m}</option>`);
  for(let y=2025;y<=2030;y++) yearSel+=`<option value="${y}"${y===curY?' selected':''}>${y}</option>`;

  const weeksHtml = weeks.map(w=>{
    let cls='';
    if(w.total===maxW.total&&maxW.total>0) cls='wk-best';
    else if(w.total===minW.total&&minW.total<Infinity) cls='wk-low';
    const badge = cls==='wk-best'?`<span class="wk-badge wk-best-badge">🏆 Terbaik</span>`:cls==='wk-low'?`<span class="wk-badge wk-low-badge">📉 Terendah</span>`:'';
    return `<div class="week-card ${cls}">
      <div class="wk-row">
        <span class="wk-lbl">Minggu ${w.wk} (${w.start}–${w.end} ${MS[curM]}) ${badge}</span>
        <span class="wk-amt">RM ${w.total.toFixed(2)}</span>
      </div>
      ${sparkSVG(w.vals,160,28)}
      <div class="wk-tooltip">📊 Purata: RM ${w.avg.toFixed(2)} &nbsp;|&nbsp; 🏆 Hari terbaik: ${w.best.day} (RM ${w.best.amt.toFixed(2)})</div>
    </div>`;
  }).join('');

  // === CADANGAN PINTAR (DATA-DRIVEN) ===
  const expCats={}, incCats={};
  const mTxAll = tx.filter(t=>new Date(t.date).getMonth()===curM&&new Date(t.date).getFullYear()===curY);
  mTxAll.forEach(t=>{
    if(t.type==='expense') expCats[t.category]=(expCats[t.category]||0)+t.amount;
    else incCats[t.category]=(incCats[t.category]||0)+t.amount;
  });
  const topExp=Object.entries(expCats).sort((a,b)=>b[1]-a[1])[0];
  const topInc=Object.entries(incCats).sort((a,b)=>b[1]-a[1])[0];

  // Previous month comparison
  const pmSug=curM>0?curM-1:11, pySug=curM>0?curY:curY-1;
  const prevInc=getMonthTotal('income',pySug,pmSug);
  const prevExp=getMonthTotal('expense',pySug,pmSug);
  const incDiff=prevInc>0?((totInc-prevInc)/prevInc*100):0;
  const expenseRatio=totInc>0?(totExp/totInc*100):0;

  // Day-of-week analysis
  const dowInc=[0,0,0,0,0,0,0], dowCount=[0,0,0,0,0,0,0];
  mTxAll.filter(t=>t.type==='income').forEach(t=>{
    const dow=new Date(t.date).getDay();
    dowInc[dow]+=t.amount; dowCount[dow]++;
  });
  const bestDow=dowInc.indexOf(Math.max(...dowInc));
  const dowNames=['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];

  // Empty days this month
  const dimSug=new Date(curY,curM+1,0).getDate();
  const today2=new Date(); const isThisM2=(today2.getFullYear()===curY&&today2.getMonth()===curM);
  const daysToCount=isThisM2?today2.getDate():dimSug;
  let emptyDays=0;
  for(let d=1;d<=daysToCount;d++){
    const ds=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(getDayTotal(ds,'income')===0) emptyDays++;
  }

  // Project end-of-month if current month
  const projectedTotal=isThisM2&&today2.getDate()>0?(totInc/today2.getDate())*dimSug:0;

  // Build multi-line suggestions
  const sugLines=[];

  if(!totInc){
    sugLines.push('⚠️ Tiada rekod pendapatan bulan ini. Klik pada tarikh untuk tambah transaksi.');
  } else {
    // Income vs prev month
    if(prevInc>0) {
      if(incDiff>10) sugLines.push(`📈 Pendapatan bulan ini <strong>${fmtFull(totInc)}</strong> — naik <span class="income">${incDiff.toFixed(1)}%</span> berbanding bulan lalu (${fmtFull(prevInc)}). Cemerlang!`);
      else if(incDiff<-10) sugLines.push(`⚠️ Pendapatan turun <span class="expense">${Math.abs(incDiff).toFixed(1)}%</span> (${fmtFull(prevInc)} → ${fmtFull(totInc)}). Semak strategi operasi minggu-minggu ini.`);
      else sugLines.push(`➡️ Pendapatan stabil: ${fmtFull(totInc)} (${incDiff>=0?'+':''}${incDiff.toFixed(1)}% vs bulan lalu).`);
    }
    // Top income source
    if(topInc) sugLines.push(`🏆 Sumber pendapatan utama: <strong>${topInc[0].replace(/^[^ ]+ /,'')}</strong> (${fmtFull(topInc[1])} — ${(topInc[1]/totInc*100).toFixed(0)}% jumlah). Fokus sumber ini.`);
    // Best day of week
    if(dowInc[bestDow]>0) sugLines.push(`📅 Hari terbaik: <strong>${dowNames[bestDow]}</strong> — purata RM ${dowCount[bestDow]>0?(dowInc[bestDow]/dowCount[bestDow]).toFixed(0):'0'}/hari. Rancang aktiviti lebih pada hari ini.`);
    // Weekly comparison
    if(maxW.total>minW.total*1.5&&weeks.length>1) sugLines.push(`📊 Jurang mingguan besar: Mg${maxW.wk} (${fmtFull(maxW.total)}) vs Mg${minW.wk} (${fmtFull(minW.total)}). Tumpukan usaha pada minggu lemah.`);
    // Empty days
    if(emptyDays>5) sugLines.push(`🔴 <strong>${emptyDays} hari</strong> tiada rekod pendapatan setakat ini bulan ini. Rekod semula atau kenal pasti hari kosong.`);
    // Expense ratio
    if(expenseRatio>50) sugLines.push(`💸 Perbelanjaan tinggi: ${expenseRatio.toFixed(0)}% daripada pendapatan. ${topExp?`Kos terbesar: <strong>${topExp[0].replace(/^[^ ]+ /,'')}</strong> (${fmtFull(topExp[1])}).`:''} Pertimbangkan penjimatan.`);
    else if(totExp>0) sugLines.push(`✅ Perbelanjaan terkawal: ${expenseRatio.toFixed(0)}% daripada pendapatan. Kekalkan corak ini.`);
    // End-of-month projection
    if(isThisM2&&projectedTotal>0&&today2.getDate()<dimSug) sugLines.push(`🔮 Unjuran akhir bulan: <strong>${fmtFull(projectedTotal)}</strong> (berdasarkan kadar semasa). ${projectedTotal>prevInc?'Potensi rekod baharu!':'Tingkat prestasi untuk capai tahap lalu.'}`);
  }

  const sug = sugLines.join('<br><br>');

  return `
    <div class="top-bar">
      <div class="tb-row1">
        <div class="top-month-nav" style="display:flex;align-items:center;gap:6px">
          <button class="nav-arr" id="prevM">‹</button>
          <div class="nav-pill" style="cursor:default">
            <select id="mSel" style="background:transparent;border:none;color:var(--p);font-weight:800;font-size:13px;font-family:inherit;outline:none;cursor:pointer">${monthSel}</select>
            <select id="ySel" style="background:transparent;border:none;color:var(--p);font-weight:800;font-size:13px;font-family:inherit;outline:none;cursor:pointer">${yearSel}</select>
          </div>
          <button class="nav-arr" id="nextM">›</button>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--t2)">${MN[curM]} ${curY}</div>
      </div>
      <div class="tb-row2">
        <div class="tb-stat"><div class="tb-stat-lbl">Pendapatan</div><div class="tb-stat-val tv-in">${fmtFull(totInc)}</div></div>
        <div class="tb-stat"><div class="tb-stat-lbl">Perbelanjaan</div><div class="tb-stat-val tv-ex">${fmtFull(totExp)}</div></div>
        <div class="tb-stat"><div class="tb-stat-lbl">Baki</div><div class="tb-stat-val ${bal<0?'tv-neg':'tv-bal'}">${fmtFull(bal)}</div></div>
      </div>
    </div>
    <div style="padding:8px 12px 4px;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);font-weight:600">
      <span>Tiada</span>
      ${[0,1,2,3,4,5,6,7].map(i=>`<div style="width:14px;height:14px;border-radius:3px;background:${{0:'#fff',1:'#f0fdf4',2:'#dcfce7',3:'#bbf7d0',4:'#86efac',5:'#4ade80',6:'#22c55e',7:'#16a34a'}[i]};border:1px solid #e5e7eb"></div>`).join('')}
      <span>Tinggi</span>
    </div>
    <div class="cal-card" style="margin-top:4px">
      <div class="cal-dn">
        ${['Isn','Sel','Rab','Kha','Jum','Sab','Ahd'].map(d=>`<div class="cal-dn-cell">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${daysHtml}</div>
    </div>
    <div class="sec-hdr"><span class="sec-title">📊 Analisa Mingguan</span></div>
    ${weeksHtml}
    <div class="perf-card" style="margin-top:4px">
      <div class="perf-lbl">Prestasi Bulanan</div>
      <div class="perf-top">
        <div class="perf-amt">${fmtFull(totInc)}</div>
        <span class="perf-badge ${avgW>500?'pb-good':'pb-mod'}">${avgW>500?'✅ Baik':'⚡ Sederhana'}</span>
      </div>
      <div class="perf-stats">
        <div class="ps-box"><div class="psb-lbl">🏆 Tertinggi</div><div class="psb-val income">RM ${maxW.total.toFixed(0)} <span style="font-size:10px;color:var(--t2)">(Mg${maxW.wk})</span></div></div>
        <div class="ps-box"><div class="psb-lbl">📉 Terendah</div><div class="psb-val expense">RM ${minW.total.toFixed(0)} <span style="font-size:10px;color:var(--t2)">(Mg${minW.wk})</span></div></div>
        <div class="ps-box"><div class="psb-lbl">📊 Purata/mg</div><div class="psb-val">RM ${avgW.toFixed(0)}</div></div>
      </div>
    </div>
    <div class="suggest-card">
      <div class="sug-title">💡 Cadangan Pintar</div>
      <div class="sug-body">${sug}</div>
    </div>`;
}

function calcStreak() {
  const dates = [...new Set(tx.map(t=>t.date))].sort();
  if (!dates.length) return 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let streak = 0, d = new Date(today);
  while (true) {
    const ds = d.toISOString().slice(0,10);
    if (dates.includes(ds)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}
function calcTotalDays() {
  if (!tx.length) return 0;
  const first = new Date(tx.map(t=>t.date).sort()[0]);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.max(1, Math.round((today - first) / 86400000) + 1);
}

// ================================================================
//  LINE CHART SVG
// ================================================================
function buildLineChart(mLabels, incomes, expenses) {
  const W=560, H=200, PL=52, PR=12, PT=14, PB=40;
  const cW=W-PL-PR, cH=H-PT-PB;
  const maxV=Math.max(...incomes,...expenses,1);
  const nice=n=>{if(!n)return 0;const p=Math.pow(10,Math.floor(Math.log10(n)));return Math.ceil(n/p)*p;};
  const yMax=nice(maxV*1.1)||1000;
  const n=mLabels.length;
  const xs=mLabels.map((_,i)=>PL+i*(cW/(n-1)));
  const ys=v=>PT+cH*(1-Math.max(0,v)/yMax);
  const ptI=incomes.map((v,i)=>`${xs[i].toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
  const ptE=expenses.map((v,i)=>`${xs[i].toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
  const bot=PT+cH;
  const aI=`M${xs[0].toFixed(1)},${bot} L${ptI} L${xs[n-1].toFixed(1)},${bot}Z`;
  const aE=`M${xs[0].toFixed(1)},${bot} L${ptE} L${xs[n-1].toFixed(1)},${bot}Z`;
  const ticks=[0,0.25,0.5,0.75,1].map(r=>{
    const v=Math.round(yMax*r),y=ys(v).toFixed(1);
    const lbl=v>=1000?(v/1000).toFixed(0)+'k':v+'';
    return '<text x="'+(PL-5)+'" y="'+(parseFloat(y)+4)+'" text-anchor="end" font-size="10" fill="#9ca3af">'+lbl+'</text><line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#e5e7eb" stroke-width="1"/>';
  }).join('');
  const xlbls=mLabels.map((m,i)=>'<text x="'+xs[i].toFixed(1)+'" y="'+(H-5)+'" text-anchor="middle" font-size="10" fill="#9ca3af" font-weight="600">'+m+'</text>').join('');
  const dotsI=incomes.map((v,i)=>'<circle cx="'+xs[i].toFixed(1)+'" cy="'+ys(v).toFixed(1)+'" r="4" fill="#60a5fa" stroke="#fff" stroke-width="2"/>').join('');
  const dotsE=expenses.map((v,i)=>'<circle cx="'+xs[i].toFixed(1)+'" cy="'+ys(v).toFixed(1)+'" r="4" fill="#f472b6" stroke="#fff" stroke-width="2"/>').join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="gI" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa" stop-opacity=".2"/><stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/></linearGradient><linearGradient id="gE" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f472b6" stop-opacity=".15"/><stop offset="100%" stop-color="#f472b6" stop-opacity="0"/></linearGradient></defs>'+ticks+xlbls+'<path d="'+aI+'" fill="url(#gI)"/><path d="'+aE+'" fill="url(#gE)"/><polyline points="'+ptI+'" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="'+ptE+'" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+dotsI+dotsE+'</svg>';
}
