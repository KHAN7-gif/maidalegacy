let lockSelectedUser = null;
const LOCK_TIMEOUT = 5 * 60 * 1000; // 5 minit

// Simple encode (not cryptographic — local app only)
function encPwd(p) { return btoa(unescape(encodeURIComponent(p + '_mde_salt'))); }

function loadUsers() {
  try { const u=localStorage.getItem(SK_USERS); if(u) appUsers=JSON.parse(u); } catch(e){}
  if(!appUsers.length) seedUsers();
}
function saveUsers() { localStorage.setItem(SK_USERS, JSON.stringify(appUsers)); }

function seedUsers() {
  appUsers = [
    { id:'u1', username:'ak',     password:encPwd('ak7777'),     role:'Admin',    color:'#d4006b' },
    { id:'u2', username:'squall', password:encPwd('squall7777'), role:'Admin',    color:'#5b5bd6' },
    { id:'u3', username:'staf1',  password:encPwd('staf1234'),   role:'Staff',    color:'#059669' },
  ];
  saveUsers();
}

// ---- Lock / Unlock ----
function showLock(timeout=false) {
  const ls = document.getElementById('lockScreen');
  if(!ls) return;
  ls.style.display='flex';
  clearInterval(lockTimer);
  if(timeout) { const tm=document.getElementById('lockTimeoutMsg'); if(tm) tm.style.display='block'; }
  renderUserTabs();
  updateLockTime();
  setInterval(updateLockTime,60000);
  document.getElementById('lockPass')?.focus();
}

function renderUserTabs() {
  const wrap=document.getElementById('userTabsLock'); if(!wrap) return;
  if(!lockSelectedUser && appUsers.length) lockSelectedUser=appUsers[0].username;
  wrap.innerHTML=appUsers.map(u=>`<button class="user-tab${lockSelectedUser===u.username?' active':''}" onclick="selectLockUser('${u.username}')">${u.username}</button>`).join('');
}

window.selectLockUser = u => { lockSelectedUser=u; renderUserTabs(); document.getElementById('lockError').classList.remove('show'); document.getElementById('lockPass').value=''; document.getElementById('lockPass').focus(); };

window.toggleLockEye = () => {
  const inp=document.getElementById('lockPass'), btn=document.getElementById('eyeBtn');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
};

window.tryLogin = () => {
  const pass=document.getElementById('lockPass')?.value||'';
  const user=appUsers.find(u=>u.username===lockSelectedUser);
  if(!user){showError('Pilih pengguna');return;}
  if(encPwd(pass)===user.password){
    currentUser=user;
    const ls=document.getElementById('lockScreen'); if(ls) ls.style.display='none';
    const tm=document.getElementById('lockTimeoutMsg'); if(tm) tm.style.display='none';
    document.getElementById('lockError').classList.remove('show');
    resetLockTimer();
    // Staff → terus ke PS Booking; Admin → Transaksi bulan ini
    if(user.role==='Staff'){
      activeTab='psbooking';
    } else {
      activeTab='calendar';
      const now=new Date();
      curY=now.getFullYear();
      curM=now.getMonth();
    }
    render();
    // Apply role access (show/hide tabs)
    setTimeout(function(){ applyRoleAccess(); }, 60);
  } else {
    showError('Kata laluan salah. Cuba lagi.');
    const inp=document.getElementById('lockPass'); if(inp){inp.value='';inp.focus();}
    const ls=document.getElementById('lockScreen'); if(ls) ls.style.animation='shake .3s';
  }
};

function showError(msg){
  const el=document.getElementById('lockError'); if(!el) return;
  el.textContent='❌ '+msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function updateLockTime(){
  const el=document.getElementById('lockTime'); if(!el) return;
  const now=new Date();
  el.textContent=now.toLocaleTimeString('ms-MY',{hour:'2-digit',minute:'2-digit'})+'  ·  '+now.toLocaleDateString('ms-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

// Auto-lock timer
function resetLockTimer(){
  clearTimeout(lockTimer);
  lockTimer=setTimeout(()=>{ currentUser=null; showLock(true); }, LOCK_TIMEOUT);
}

// Listen for any activity to reset timer
['click','keydown','scroll','touchstart'].forEach(ev=>{
  document.addEventListener(ev, ()=>{ if(currentUser) resetLockTimer(); }, {passive:true});
});

// Enter key in password field
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('lockPass')?.addEventListener('keypress', e=>{ if(e.key==='Enter') tryLogin(); });
});

// ---- User Management ----
window.addUser = () => {
  const un=prompt('Nama pengguna (username):')?.trim();
  if(!un) return;
  if(appUsers.find(u=>u.username.toLowerCase()===un.toLowerCase())){alert('Username sudah wujud!');return;}
  const pw=prompt(`Kata laluan untuk "${un}":`);
  if(!pw||pw.length<4){alert('Kata laluan mesti sekurang-kurangnya 4 aksara');return;}
  const role=prompt('Peranan (Admin/Operator):','Operator')?.trim()||'Operator';
  const colors=['#d4006b','#5b5bd6','#16a34a','#d97706','#0ea5e9'];
  appUsers.push({id:'u'+Date.now(),username:un,password:encPwd(pw),role,color:colors[appUsers.length%colors.length]});
  saveUsers(); render(); alert(`✅ Pengguna "${un}" berjaya ditambah!`);
};

window.editUserPwd = id => {
  const user=appUsers.find(u=>u.id===id); if(!user) return;
  const pw=prompt(`Kata laluan baru untuk "${user.username}":`);
  if(!pw||pw.length<4){alert('Minimum 4 aksara');return;}
  user.password=encPwd(pw); saveUsers(); alert(`✅ Kata laluan "${user.username}" dikemas kini!`);
};

window.deleteUser = id => {
  const user=appUsers.find(u=>u.id===id); if(!user) return;
  if(appUsers.length<=1){alert('Mesti ada sekurang-kurangnya 1 pengguna!');return;}
  if(user.id===currentUser?.id){alert('Tidak boleh padam pengguna yang sedang log masuk!');return;}
  if(!confirm(`Padam pengguna "${user.username}"?`)) return;
  appUsers=appUsers.filter(u=>u.id!==id); saveUsers(); render();
};

window.lockApp = () => { currentUser=null; showLock(false); };
